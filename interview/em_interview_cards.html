const STORE_KEY = 'em_interview_mastered';
let mastered = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));
let activeCats = new Set();
let activeDiffs = new Set();
let hideMasteredFlag = false;
const allCats = [...new Set(CARDS.flatMap(c => c.cats))].sort();


function renderFilters() {
  const container = document.getElementById('categoryGroupContainer');
  const catCount = {};
  CARDS.forEach(c => c.cats.forEach(t => { catCount[t] = (catCount[t]||0) + 1; }));
  const used = new Set();
  let html = '';
  for (const group of CAT_GROUPS) {
    const validCats = group.cats.filter(c => catCount[c]);
    if (!validCats.length) continue;
    validCats.forEach(c => used.add(c));
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">${group.name}</strong>
      ${validCats.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  const rest = allCats.filter(c => !used.has(c));
  if (rest.length) {
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">📌 其它</strong>
      ${rest.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  container.innerHTML = html;
}

function renderCards() {
  const html = CARDS.map(c => {
    const diffLabel = {basic:'🟢 基础', mid:'🟡 中级', high:'🔴 高级'}[c.diff];

    const isMastered = mastered.has(c.id);
    return `
      <div class="card diff-${c.diff} ${isMastered?'mastered':''}" data-id="${c.id}" data-diff="${c.diff}" data-cats="${c.cats.join('|')}">
        <div class="card-header">
          <span class="card-id">#${String(c.id).padStart(3,'0')}</span>
          <span class="card-tag ${c.diff}">${diffLabel}</span>
          ${tags}
          <div class="card-actions">
            <button class="mastered-btn ${isMastered?'on':''}" onclick="toggleMaster(${c.id}, this)">${isMastered?'✓ 已掌握':'标为已掌握'}</button>
          </div>
        </div>
        <div class="question" onclick="toggleExpand(this)">${c.q}</div>
        <div class="answer">
          <h4>📝 标准答案 / 高分要点</h4>
          <div>${c.ans}</div>
          ${c.code ? `<h4 class="code">💻 框架 / 示例</h4>${c.code}` : ''}
          ${c.bonus ? `<h4 class="bonus">⭐ 加分点 / 心法</h4><div>${c.bonus}</div>` : ''}
          ${c.trap ? `<h4 class="trap">⚠️ 常见陷阱 / 红旗</h4><div>${c.trap}</div>` : ''}
          ${typeof MICardExtras !== 'undefined' ? MICardExtras.render(c) : ''}
          ${c.ref ? `<div class="ref">📚 深度阅读: <a href="${c.ref}.html" target="_blank" rel="noopener" onclick="event.stopPropagation()">${c.ref.split('/').pop()}.html</a></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('cards').innerHTML = html;
  updateStats();
}

function toggleExpand(el) { el.parentElement.classList.toggle('expanded'); }
function expandAll() { document.querySelectorAll('.card:not(.hidden)').forEach(c => c.classList.add('expanded')); }
function collapseAll() { document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded')); }
function toggleMaster(id, btn) {
  if (mastered.has(id)) mastered.delete(id); else mastered.add(id);
  localStorage.setItem(STORE_KEY, JSON.stringify([...mastered]));
  const card = btn.closest('.card');
  card.classList.toggle('mastered', mastered.has(id));
  btn.classList.toggle('on', mastered.has(id));
  btn.textContent = mastered.has(id) ? '✓ 已掌握' : '标为已掌握';
  if (hideMasteredFlag) filter();
  updateStats();
}
function resetMastered() {
  if (!confirm('清空所有"已掌握"标记?')) return;
  mastered.clear();
  localStorage.setItem(STORE_KEY, '[]');
  document.querySelectorAll('.card.mastered').forEach(c => c.classList.remove('mastered'));
  document.querySelectorAll('.mastered-btn.on').forEach(b => { b.classList.remove('on'); b.textContent = '标为已掌握'; });
  updateStats();
}
function hideMastered() {
  hideMasteredFlag = !hideMasteredFlag;
  const btn = document.getElementById('hideMasteredBtn');
  btn.classList.toggle('active', hideMasteredFlag);
  btn.textContent = hideMasteredFlag ? '显示已掌握' : '隐藏已掌握';
  filter();
}
function toggleCat(cat, el) {
  if (activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat);
  el.classList.toggle('active');
  filter();
}
function toggleDiff(d, el) {
  if (activeDiffs.has(d)) activeDiffs.delete(d); else activeDiffs.add(d);
  el.classList.toggle('active');
  filter();
}
function filter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const id = +card.dataset.id;
    const diff = card.dataset.diff;
    const cats = card.dataset.cats.split('|');
    const text = card.textContent.toLowerCase();
    let show = true;
    if (activeCats.size > 0 && !cats.some(c => activeCats.has(c))) show = false;
    if (activeDiffs.size > 0 && !activeDiffs.has(diff)) show = false;
    if (q && !text.includes(q)) show = false;
    if (hideMasteredFlag && mastered.has(id)) show = false;
    card.classList.toggle('hidden', !show);
  });
  updateStats();
}
function randomize() {
  const visible = [...document.querySelectorAll('.card:not(.hidden)')];
  if (visible.length === 0) return;
  const pick = visible[Math.floor(Math.random() * visible.length)];
  collapseAll();
  pick.classList.add('expanded');
  pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function updateStats() {
  const total = CARDS.length;
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  const m = mastered.size;
  document.getElementById('stats').innerHTML =
    `共 ${total} 题 · 当前显示 ${visible} 题 · 已掌握 ${m}/${total} (${(m/total*100).toFixed(0)}%)`;
}
renderFilters();
renderCards();
</script>
</body>
</html>
