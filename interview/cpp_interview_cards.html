      "staff": "深一层：monotonic_buffer_resource 是 C++17 引入的<strong>\"零分配请求处理\"</strong>核心工具，借鉴自 Andrei Alexandrescu 等 talks。<strong>设计哲学</strong>：① <strong>分配 fast path</strong>：bump pointer，&lt; 5 ns；② <strong>释放是 batch 操作</strong>：整体 reset / destroy；③ <strong>对齐自动处理</strong>（按要求对齐推进指针）。<br><br><strong>vs std::allocator / jemalloc</strong>：<br>· <strong>std::allocator</strong>: 通用，~30-100 ns / allocation，可单独 free<br>· <strong>jemalloc / tcmalloc</strong>: 优化的通用 allocator，~15-50 ns<br>· <strong>monotonic_buffer</strong>: ~5 ns，但只能 batch release<br><strong>适用场景</strong>：① <strong>请求级生命周期</strong>（web server / RPC handler）；② <strong>解析中间对象</strong>（parser tree）；③ <strong>批处理任务</strong>。<br><br><strong>真实经验</strong>：platform agent 每个 RPC 包含多个解析步骤（XML / schema / config diff），<strong>之前用 new/delete</strong>，单 RPC ~80 次 allocation，单 RPC ~50 µs。<br><strong>改造</strong>：① 每个 RPC 处理函数栈上 64KB buffer + monotonic_buffer_resource；② 所有 STL 容器换 pmr 版本；③ string 用 pmr::string；<br><strong>结果</strong>：① RPC 内 allocation 数 ~80 → 1（只 arena 内部偶尔 grow upstream）；② 单 RPC 时延 50 µs → 12 µs（-76%）；③ <strong>P99 抖动</strong>显著降低（allocator 是 P99 主因之一）。<strong>陷阱</strong>：① 容器析构时仍调元素 dtor（不是 0 cost）；② <strong>不能在 arena 销毁后访问</strong>元素；③ pmr 容器跟普通容器不兼容（不同 allocator type）。<strong>替代</strong>：① <strong>fmt::format_to_n</strong> 直接写栈 buffer；② <strong>boost::container::small_vector</strong> 小对象内嵌；③ 自定义 arena（更激进，不走 PMR 抽象层）。"

      "senior": "<strong>关键代码骨架</strong>：<br><code>template&lt;class K, class V&gt; class LRUCache {</code><br><code>    size_t cap_;</code><br><code>    std::list&lt;std::pair&lt;K, V&gt;&gt; lst_;</code><br><code>    std::unordered_map&lt;K, decltype(lst_)::iterator&gt; map_;</code><br><code>public:</code><br><code>    explicit LRUCache(size_t cap) : cap_(cap) {}</code><br><code>    std::optional&lt;V&gt; get(const K&amp; k) {</code><br><code>        auto it = map_.find(k);</code><br><code>        if (it == map_.end()) return std::nullopt;</code><br><code>        lst_.splice(lst_.begin(), lst_, it-&gt;second);  // O(1) 移到头</code><br><code>        return it-&gt;second-&gt;second;</code><br><code>    }</code><br><code>    void put(K k, V v) {</code><br><code>        auto it = map_.find(k);</code><br><code>        if (it != map_.end()) {</code><br><code>            it-&gt;second-&gt;second = std::move(v);</code><br><code>            lst_.splice(lst_.begin(), lst_, it-&gt;second);</code><br><code>            return;</code><br><code>        }</code><br><code>        if (lst_.size() == cap_) {</code><br><code>            map_.erase(lst_.back().first);</code><br><code>            lst_.pop_back();</code><br><code>        }</code><br><code>        lst_.emplace_front(k, std::move(v));</code><br><code>        map_[k] = lst_.begin();</code><br><code>    }</code><br><code>};</code>",

      "senior": "<strong>典型问题</strong>：<br><code>template&lt;class T&gt; class Derived : public Base&lt;T&gt; { void foo() { bar(); } };</code><br>—— 编译错 \"bar() 未声明\"。原因：bar() 在 Base&lt;T&gt; 里定义（依赖 T），但 Derived::foo() 解析时 \"bar\" 不是依赖名字（没看到 T） → 第一阶段不在依赖名字查找列表 → 编译器在 Derived 当前作用域 + 全局作用域找，找不到。<strong>修正</strong>：<br>① <code>this-&gt;bar();</code>（this 是依赖于 T 的 → 整个表达式变依赖名字）<br>② <code>Base&lt;T&gt;::bar();</code>（显式作用域）",

    "code": "<pre><span class=\"kw\">void</span> <span class=\"fn\">sift_down</span>(<span class=\"kw\">int</span>* a, <span class=\"kw\">int</span> n, <span class=\"kw\">int</span> i) {\n    <span class=\"kw\">int</span> largest = i, l = 2*i+1, r = 2*i+2;\n    <span class=\"kw\">if</span> (l &lt; n &amp;&amp; a[l] &gt; a[largest]) largest = l;\n    <span class=\"kw\">if</span> (r &lt; n &amp;&amp; a[r] &gt; a[largest]) largest = r;\n    <span class=\"kw\">if</span> (largest != i) {\n        std::<span class=\"fn\">swap</span>(a[i], a[largest]);\n        <span class=\"fn\">sift_down</span>(a, n, largest);\n    }\n}\n<span class=\"kw\">void</span> <span class=\"fn\">heapsort</span>(<span class=\"kw\">int</span>* a, <span class=\"kw\">int</span> n) {\n    <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = n/2-1; i &gt;= 0; --i) <span class=\"fn\">sift_down</span>(a, n, i);\n    <span class=\"kw\">for</span> (<span class=\"kw\">int</span> i = n-1; i &gt; 0; --i) {\n        std::<span class=\"fn\">swap</span>(a[0], a[i]);\n        <span class=\"fn\">sift_down</span>(a, i, 0);\n    }\n}</pre>",

    "ans": "<b>思路</b>: DP, dp[i][j] = \"以 a[i-1]/b[j-1] 结尾的公共子串长度\". 状态转移: a[i-1]==b[j-1] → dp[i][j]=dp[i-1][j-1]+1; 否则 0. 记录最大值 + 位置. O(m*n) 时间空间.",
    "code": "<pre>std::string <span class=\"fn\">lcs</span>(<span class=\"kw\">const</span> std::string&amp; a, <span class=\"kw\">const</span> std::string&amp; b) {\n    std::vector&lt;std::vector&lt;<span class=\"kw\">int</span>&gt;&gt; dp(a.<span class=\"fn\">size</span>()+1, std::vector&lt;<span class=\"kw\">int</span>&gt;(b.<span class=\"fn\">size</span>()+1, 0));\n    <span class=\"kw\">int</span> maxLen = 0, endIdx = 0;\n    <span class=\"kw\">for</span> (<span class=\"kw\">size_t</span> i = 1; i &lt;= a.<span class=\"fn\">size</span>(); ++i)\n        <span class=\"kw\">for</span> (<span class=\"kw\">size_t</span> j = 1; j &lt;= b.<span class=\"fn\">size</span>(); ++j)\n            <span class=\"kw\">if</span> (a[i-1] == b[j-1]) {\n                dp[i][j] = dp[i-1][j-1] + 1;\n                <span class=\"kw\">if</span> (dp[i][j] &gt; maxLen) { maxLen = dp[i][j]; endIdx = i; }\n            }\n    <span class=\"kw\">return</span> a.<span class=\"fn\">substr</span>(endIdx - maxLen, maxLen);\n}</pre>",
    "bonus": "最长公共<strong>子序列</strong> (LCS, 不连续) 不同: 不连续时 dp[i][j] = max(dp[i-1][j], dp[i][j-1]).",

    "code": "<pre><span class=\"kw\">class</span> <span class=\"type\">String</span> {\n    <span class=\"kw\">char</span>* data_ = <span class=\"kw\">nullptr</span>;\n    <span class=\"kw\">size_t</span> size_ = 0;\n<span class=\"kw\">public</span>:\n    <span class=\"fn\">String</span>() = <span class=\"kw\">default</span>;\n    <span class=\"fn\">String</span>(<span class=\"kw\">const</span> <span class=\"kw\">char</span>* s) : size_(<span class=\"fn\">strlen</span>(s)) {\n        data_ = <span class=\"kw\">new</span> <span class=\"kw\">char</span>[size_ + 1];\n        std::<span class=\"fn\">memcpy</span>(data_, s, size_ + 1);\n    }\n    ~<span class=\"fn\">String</span>() { <span class=\"kw\">delete</span>[] data_; }\n    <span class=\"fn\">String</span>(<span class=\"kw\">const</span> <span class=\"type\">String</span>&amp; o) : <span class=\"fn\">String</span>(o.data_) {}\n    <span class=\"fn\">String</span>(<span class=\"type\">String</span>&amp;&amp; o) <span class=\"kw\">noexcept</span> : data_(o.data_), size_(o.size_) {\n        o.data_ = <span class=\"kw\">nullptr</span>; o.size_ = 0;\n    }\n    <span class=\"type\">String</span>&amp; <span class=\"fn\">operator</span>=(<span class=\"type\">String</span> rhs) <span class=\"kw\">noexcept</span> {       <span class=\"cm\">// 一次实现 4 种</span>\n        std::<span class=\"fn\">swap</span>(data_, rhs.data_);\n        std::<span class=\"fn\">swap</span>(size_, rhs.size_);\n        <span class=\"kw\">return</span> *<span class=\"kw\">this</span>;\n    }\n};</pre>",

    "code": "<pre><span class=\"kw\">int</span> <span class=\"fn\">findKthLargest</span>(std::vector&lt;<span class=\"kw\">int</span>&gt;&amp; v, <span class=\"kw\">int</span> k) {\n    <span class=\"cm\">// 方法 1: nth_element (最快平均 O(n))</span>\n    std::<span class=\"fn\">nth_element</span>(v.<span class=\"fn\">begin</span>(), v.<span class=\"fn\">begin</span>() + k-1, v.<span class=\"fn\">end</span>(), std::greater&lt;&gt;{});\n    <span class=\"kw\">return</span> v[k-1];\n\n    <span class=\"cm\">// 方法 2: 小顶堆 (流式)</span>\n    std::priority_queue&lt;<span class=\"kw\">int</span>, std::vector&lt;<span class=\"kw\">int</span>&gt;, std::greater&lt;&gt;&gt; pq;\n    <span class=\"kw\">for</span> (<span class=\"kw\">int</span> x : v) {\n        pq.<span class=\"fn\">push</span>(x);\n        <span class=\"kw\">if</span> ((<span class=\"kw\">int</span>)pq.<span class=\"fn\">size</span>() &gt; k) pq.<span class=\"fn\">pop</span>();\n    }\n    <span class=\"kw\">return</span> pq.<span class=\"fn\">top</span>();\n}</pre>",

    "code": "<pre><span class=\"kw\">template</span>&lt;<span class=\"kw\">class</span> T&gt;\n<span class=\"kw\">class</span> <span class=\"type\">BoundedQueue</span> {\n    std::queue&lt;T&gt; q_;\n    std::mutex mu_;\n    std::condition_variable cv_full_, cv_empty_;\n    <span class=\"kw\">size_t</span> cap_;\n    <span class=\"kw\">bool</span> closed_ = <span class=\"kw\">false</span>;\n<span class=\"kw\">public</span>:\n    <span class=\"kw\">explicit</span> <span class=\"fn\">BoundedQueue</span>(<span class=\"kw\">size_t</span> c) : cap_(c) {}\n    <span class=\"kw\">void</span> <span class=\"fn\">push</span>(T v) {\n        std::unique_lock lk{mu_};\n        cv_full_.<span class=\"fn\">wait</span>(lk, [<span class=\"kw\">this</span>]{ <span class=\"kw\">return</span> closed_ || q_.<span class=\"fn\">size</span>() &lt; cap_; });\n        <span class=\"kw\">if</span> (closed_) <span class=\"kw\">return</span>;\n        q_.<span class=\"fn\">push</span>(std::move(v));\n        cv_empty_.<span class=\"fn\">notify_one</span>();\n    }\n    std::optional&lt;T&gt; <span class=\"fn\">pop</span>() {\n        std::unique_lock lk{mu_};\n        cv_empty_.<span class=\"fn\">wait</span>(lk, [<span class=\"kw\">this</span>]{ <span class=\"kw\">return</span> closed_ || !q_.<span class=\"fn\">empty</span>(); });\n        <span class=\"kw\">if</span> (q_.<span class=\"fn\">empty</span>()) <span class=\"kw\">return</span> std::nullopt;\n        <span class=\"kw\">auto</span> v = std::move(q_.<span class=\"fn\">front</span>()); q_.<span class=\"fn\">pop</span>();\n        cv_full_.<span class=\"fn\">notify_one</span>();\n        <span class=\"kw\">return</span> v;\n    }\n};</pre>",

    "code": "<pre><span class=\"kw\">class</span> <span class=\"type\">ThreadPool</span> {\n    std::vector&lt;std::thread&gt; ws_;\n    std::queue&lt;std::function&lt;<span class=\"kw\">void</span>()&gt;&gt; tasks_;\n    std::mutex mu_;\n    std::condition_variable cv_;\n    <span class=\"kw\">bool</span> stop_ = <span class=\"kw\">false</span>;\n<span class=\"kw\">public</span>:\n    <span class=\"fn\">ThreadPool</span>(<span class=\"kw\">size_t</span> n) {\n        <span class=\"kw\">for</span> (<span class=\"kw\">size_t</span> i = 0; i &lt; n; ++i)\n            ws_.<span class=\"fn\">emplace_back</span>([<span class=\"kw\">this</span>]{ <span class=\"fn\">loop</span>(); });\n    }\n    ~<span class=\"fn\">ThreadPool</span>() {\n        { std::lock_guard lk{mu_}; stop_ = <span class=\"kw\">true</span>; }\n        cv_.<span class=\"fn\">notify_all</span>();\n        <span class=\"kw\">for</span> (<span class=\"kw\">auto</span>&amp; t : ws_) t.<span class=\"fn\">join</span>();\n    }\n    <span class=\"kw\">template</span>&lt;<span class=\"kw\">class</span> F, <span class=\"kw\">class</span>... A&gt;\n    <span class=\"kw\">auto</span> <span class=\"fn\">submit</span>(F&amp;&amp; f, A&amp;&amp;... a) {\n        <span class=\"kw\">using</span> R = std::invoke_result_t&lt;F, A...&gt;;\n        <span class=\"kw\">auto</span> task = std::<span class=\"fn\">make_shared</span>&lt;std::packaged_task&lt;R()&gt;&gt;(\n            std::bind(std::forward&lt;F&gt;(f), std::forward&lt;A&gt;(a)...));\n        <span class=\"kw\">auto</span> fut = task-&gt;<span class=\"fn\">get_future</span>();\n        { std::lock_guard lk{mu_}; tasks_.<span class=\"fn\">emplace</span>([task]{ (*task)(); }); }\n        cv_.<span class=\"fn\">notify_one</span>();\n        <span class=\"kw\">return</span> fut;\n    }\n<span class=\"kw\">private</span>:\n    <span class=\"kw\">void</span> <span class=\"fn\">loop</span>() {\n        <span class=\"kw\">while</span> (<span class=\"kw\">true</span>) {\n            std::function&lt;<span class=\"kw\">void</span>()&gt; t;\n            {\n                std::unique_lock lk{mu_};\n                cv_.<span class=\"fn\">wait</span>(lk, [<span class=\"kw\">this</span>]{ <span class=\"kw\">return</span> stop_ || !tasks_.<span class=\"fn\">empty</span>(); });\n                <span class=\"kw\">if</span> (stop_ &amp;&amp; tasks_.<span class=\"fn\">empty</span>()) <span class=\"kw\">return</span>;\n                t = std::move(tasks_.<span class=\"fn\">front</span>()); tasks_.<span class=\"fn\">pop</span>();\n            }\n            <span class=\"fn\">t</span>();\n        }\n    }\n};</pre>",

    "code": "<pre><span class=\"kw\">template</span>&lt;<span class=\"kw\">class</span> T&gt;\n<span class=\"kw\">class</span> <span class=\"type\">Vector</span> {\n    T* data_ = <span class=\"kw\">nullptr</span>;\n    <span class=\"kw\">size_t</span> size_ = 0, cap_ = 0;\n    <span class=\"kw\">void</span> <span class=\"fn\">grow</span>(<span class=\"kw\">size_t</span> newCap) {\n        T* newData = (T*)::<span class=\"fn\">operator</span> <span class=\"kw\">new</span>(newCap * <span class=\"kw\">sizeof</span>(T));\n        <span class=\"kw\">for</span> (<span class=\"kw\">size_t</span> i = 0; i &lt; size_; ++i)\n            <span class=\"kw\">new</span> (newData + i) T(std::move_if_noexcept(data_[i]));\n        <span class=\"kw\">for</span> (<span class=\"kw\">size_t</span> i = 0; i &lt; size_; ++i) data_[i].~T();\n        ::<span class=\"fn\">operator</span> <span class=\"kw\">delete</span>(data_);\n        data_ = newData;\n        cap_ = newCap;\n    }\n<span class=\"kw\">public</span>:\n    <span class=\"kw\">void</span> <span class=\"fn\">push_back</span>(<span class=\"kw\">const</span> T&amp; v) {\n        <span class=\"kw\">if</span> (size_ == cap_) <span class=\"fn\">grow</span>(cap_ ? cap_ * 2 : 4);\n        <span class=\"kw\">new</span> (data_ + size_++) T(v);\n    }\n};</pre>",

const STORE_KEY = 'cpp_interview_mastered';
let mastered = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));

let activeCats = new Set();
let activeDiffs = new Set();
let hideMasteredFlag = false;

const allCats = [...new Set(CARDS.flatMap(c => c.cats))].sort();

// 考点分组 — 让 39+ 个 chips 更易筛选

function renderFilters() {
  const container = document.getElementById('categoryGroupContainer');
  // 统计每个 cat 的题目数
  const catCount = {};
  CARDS.forEach(c => c.cats.forEach(t => { catCount[t] = (catCount[t]||0) + 1; }));

  const used = new Set();
  let html = '';
  for (const group of CAT_GROUPS) {
    const validCats = group.cats.filter(c => catCount[c]);
    if (!validCats.length) continue;
    validCats.forEach(c => used.add(c));
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">${group.name}</strong>
      ${validCats.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  // 其余未分组的
  const rest = allCats.filter(c => !used.has(c));
  if (rest.length) {
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">📌 其它</strong>
      ${rest.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  container.innerHTML = html;
}

function renderCards() {
  const html = CARDS.map(c => {
    const diffLabel = {basic:'基础', mid:'中级', high:'高级'}[c.diff];
    const tags = c.cats.map(t => `<span class="card-cat">${t}</span>`).join('');
    const isMastered = mastered.has(c.id);
    return `
      <div class="card diff-${c.diff} ${isMastered?'mastered':''}" data-id="${c.id}" data-diff="${c.diff}" data-cats="${c.cats.join('|')}">
        <div class="card-header">
          <span class="card-id">#${String(c.id).padStart(3,'0')}</span>
          <span class="card-tag ${c.diff}">${diffLabel}</span>
          ${tags}
          <div class="card-actions">
            <button class="mastered-btn ${isMastered?'on':''}" onclick="toggleMaster(${c.id}, this)">${isMastered?'✓ 已掌握':'标为已掌握'}</button>
          </div>
        </div>
        <div class="question" onclick="toggleExpand(this)">${c.q}</div>
        <div class="answer">
          <h4>📝 标准答案</h4>
          <div>${c.ans}</div>
          ${c.code ? `<h4 class="code">💻 示例代码</h4>${c.code}` : ''}
          ${c.bonus ? `<h4 class="bonus">⭐ 加分点 / 进阶</h4><div>${c.bonus}</div>` : ''}
          ${c.trap ? `<h4 class="trap">⚠️ 常见陷阱</h4><div>${c.trap}</div>` : ''}
          ${typeof MICardExtras !== 'undefined' ? MICardExtras.render(c) : ''}
          ${c.ref ? `<div class="ref">📚 关联资料: <a href="${c.ref}.html" target="_blank" rel="noopener" onclick="event.stopPropagation()"><strong>${c.ref}.html</strong></a></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('cards').innerHTML = html;
  updateStats();
}

function toggleExpand(el) { el.parentElement.classList.toggle('expanded'); }

function expandAll() {
  document.querySelectorAll('.card:not(.hidden)').forEach(c => c.classList.add('expanded'));
}
function collapseAll() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
}

function toggleMaster(id, btn) {
  if (mastered.has(id)) mastered.delete(id);
  else mastered.add(id);
  localStorage.setItem(STORE_KEY, JSON.stringify([...mastered]));
  const card = btn.closest('.card');
  card.classList.toggle('mastered', mastered.has(id));
  btn.classList.toggle('on', mastered.has(id));
  btn.textContent = mastered.has(id) ? '✓ 已掌握' : '标为已掌握';
  if (hideMasteredFlag) filter();
  updateStats();
}

function resetMastered() {
  if (!confirm('清空所有"已掌握"标记?')) return;
  mastered.clear();
  localStorage.setItem(STORE_KEY, '[]');
  document.querySelectorAll('.card.mastered').forEach(c => c.classList.remove('mastered'));
  document.querySelectorAll('.mastered-btn.on').forEach(b => {
    b.classList.remove('on');
    b.textContent = '标为已掌握';
  });
  updateStats();
}

function hideMastered() {
  hideMasteredFlag = !hideMasteredFlag;
  const btn = document.getElementById('hideMasteredBtn');
  btn.classList.toggle('active', hideMasteredFlag);
  btn.textContent = hideMasteredFlag ? '显示已掌握' : '隐藏已掌握';
  filter();
}

function toggleCat(cat, el) {
  if (activeCats.has(cat)) activeCats.delete(cat);
  else activeCats.add(cat);
  el.classList.toggle('active');
  filter();
}

function toggleDiff(d, el) {
  if (activeDiffs.has(d)) activeDiffs.delete(d);
  else activeDiffs.add(d);
  el.classList.toggle('active');
  filter();
}

function filter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const id = +card.dataset.id;
    const diff = card.dataset.diff;
    const cats = card.dataset.cats.split('|');
    const text = card.textContent.toLowerCase();

    let show = true;
    if (activeCats.size > 0 && !cats.some(c => activeCats.has(c))) show = false;
    if (activeDiffs.size > 0 && !activeDiffs.has(diff)) show = false;
    if (q && !text.includes(q)) show = false;
    if (hideMasteredFlag && mastered.has(id)) show = false;

    card.classList.toggle('hidden', !show);
  });
  updateStats();
}

function randomize() {
  const visible = [...document.querySelectorAll('.card:not(.hidden)')];
  if (visible.length === 0) return;
  const pick = visible[Math.floor(Math.random() * visible.length)];
  collapseAll();
  pick.classList.add('expanded');
  pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateStats() {
  const total = CARDS.length;
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  const m = mastered.size;
  document.getElementById('stats').innerHTML =
    `共 ${total} 题 · 当前显示 ${visible} 题 · 已掌握 ${m}/${total} (${(m/total*100).toFixed(0)}%)`;
}

renderFilters();
renderCards();
</script>
<script src="../assets/site-theme-toggle.js" defer></script>

<style>.back-top{align-items:center;justify-content:center}.back-top.show{display:flex}</style>
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
  (function(){
    var btn = document.getElementById('backTop');
    if (!btn) return;
    function tg(){ btn.classList.toggle('show', window.scrollY > 400); }
    window.addEventListener('scroll', tg, { passive: true });
    tg();
  })();
</script>
