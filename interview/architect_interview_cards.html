<script>
// <CARDS:BEGIN slug=architect cards=59 groups=8 auto-generated from interview/data/architect.json — DO NOT EDIT BY HAND. Run `npm run build:cards` after editing the JSON.>
const CARDS = [
  {
    "id": 1,
    "cats": [
      "架构定义",
      "P0"
    ],
    "diff": "basic",
    "q": "什么是软件架构？",
    "ans": "架构 = <strong>难改的关键决策的总和</strong>（Fowler）。包括：宏观结构、质量属性承诺、约束。判断标准：<strong>回滚成本 &gt; 1 个月</strong> 才算架构决策。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 2,
    "cats": [
      "C4 模型",
      "P0"
    ],
    "diff": "basic",
    "q": "C4 模型的四个层级是什么？",
    "ans": "<strong>L1 Context</strong>（系统 + 用户 + 外部系统）→ <strong>L2 Container</strong>（独立部署单元）→ <strong>L3 Component</strong>（单 Container 内部模块）→ <strong>L4 Code</strong>（类/函数，通常 IDE 生成不画）。",
    "bonus": "<strong>不同层级给不同受众看</strong>：高管看 L1，产品看 L2，开发看 L3，新人看 L4。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 3,
    "cats": [
      "ATAM",
      "P0"
    ],
    "diff": "mid",
    "q": "ATAM 评估法的四类输出是什么？",
    "ans": "🔴 <strong>Risk</strong>（无法达到关键场景） / 🟡 <strong>Sensitivity Point</strong>（决策显著影响某属性） / 🟠 <strong>Tradeoff Point</strong>（决策同时影响多属性方向相反） / 🟢 <strong>Non-Risk</strong>（评估后无问题）。",
    "bonus": "<strong>Tradeoff Point 必须写 ADR</strong> 记录权衡过程。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 4,
    "cats": [
      "质量属性",
      "P0"
    ],
    "diff": "mid",
    "q": "什么是\"刺激-响应-度量\"三段式？",
    "ans": "质量属性必须用 <strong>Source + Stimulus + Environment + Response + Measure</strong> 表达。",
    "code": "<pre>❌ 错误：\"系统要快\"\n✅ 正确：\"正常负载下 10k QPS GET 请求到 API 网关，P99 ≤ 50ms\"</pre>",
    "bonus": "<strong>不可测量的需求不是工程需求</strong>。所有非功能需求都要可量化。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 5,
    "cats": [
      "CAP",
      "P0"
    ],
    "diff": "mid",
    "q": "CAP 定理常见误读？",
    "ans": "三大误读：<ol><li>CAP 是<strong>永恒三选二</strong>——错，<strong>只在分区时</strong>才二选一。</li><li>CAP 的 C = ACID 的 C——错，是 <strong>Linearizability</strong>。</li><li>关系数据库是 CA 系统——错，<strong>没有 CA 系统</strong>（分布式必有 P）。</li></ol>",
    "why_asked": "验证候选人是否真正理解 CAP，能否在分布式系统设计里做正确权衡。区分'背过定义'和'有体感'——后者能识别业内常见误读，并能说出真实系统的 CAP 定位。",
    "answers": {
      "mid": "CAP 在分布式系统里指 <strong>Consistency / Availability / Partition tolerance</strong>，常规结论是'三选二'。实际架构里常见 AP（高可用，最终一致）或 CP（强一致，可能不可用）。",
      "senior": "三大常见误读：① CAP <strong>不是永恒三选二</strong>，只在<strong>发生分区时</strong>才二选一；正常时 C 和 A 都应做好。② CAP 的 C ≠ ACID 的 C，是 <strong>Linearizability</strong>（线性一致性）。③ 不存在 CA 系统——任何跨网络的分布式系统都必须容忍分区，因此 P 是默认前提，真正选择只在 A 和 C 之间。",
      "staff": "用 <strong>PACELC</strong> 补全：分区时 P→AC 选一；<strong>正常时 ELC 还有 Latency-Consistency 取舍</strong>。举例：DynamoDB 是 PA/EL，etcd 是 PC/EC，Cassandra 可调（QUORUM = PC/EC，ONE = PA/EL）。更深一层：<strong>FLP 不可能定理</strong>告诉我们异步系统不存在确定性共识算法，所以所有 P 实现（Raft / Paxos）都靠超时 + 随机化绕过 FLP。在我做过的车端遥测网关中，跨地域接入选 AP（最终一致），核心配置仓库选 CP（强一致）——同一系统不同子域不同选型。"
    },
    "failure_modes": [
      "把 CAP 的 C 等同于 ACID 的 C（前者是 Linearizability，后者是事务约束保证）",
      "说 'MySQL 是 CA 系统'——暴露不懂'分布式必有 P'，MySQL 单实例不是分布式系统",
      "用 '三选二' 做绝对化判断，忽略 PACELC 在正常时的 Latency vs Consistency 取舍",
      "不能举出真实系统的 CAP 定位（如不知道 etcd 是 CP、DynamoDB 是 AP）",
      "把 P 仅理解为 '网络断了'，实际还包括延迟陡升、消息丢失、分区合并"
    ],
    "follow_ups": [
      {
        "q": "你设计/维护的系统是 CP 还是 AP？为什么？",
        "hint": "结合业务对一致性 vs 可用性的承诺；最好带 SLO 数字（如 '可用性 99.95%、最终一致延迟 P99 ≤ 500ms'）"
      },
      {
        "q": "Linearizability、Sequential、Causal 一致性区别？",
        "hint": "强到弱：Linearizable 要全局实时顺序 / Sequential 要全局顺序但不要求实时 / Causal 只保因果关系；AP 系统能给的最强保证是 Causal"
      },
      {
        "q": "Raft 怎么实现 Linearizability？",
        "hint": "Leader 串行所有写 + 读必须经过 Leader（或读 lease 优化）；写多数派确认才返回成功"
      },
      {
        "q": "如果选 AP，怎么向业务/用户解释数据可能不一致？",
        "hint": "用 BASE（Basically Available, Soft state, Eventual consistency）+ 业务层补偿（如对账 / 重试 / 冲突合并 CRDT）"
      }
    ],
    "ref": "../architect/distributed_systems_fundamentals"
  },
  {
    "id": 6,
    "cats": [
      "架构风格",
      "P0"
    ],
    "diff": "mid",
    "q": "Hexagonal、Onion、Clean Architecture 的区别？",
    "ans": "<strong>本质相同</strong>，都是依赖倒置 + 业务核心独立。区别只在视觉化：Hexagonal 是两层（核心 + 外部），Onion 是同心圆多层，Clean 是 4 层 + 明确 Dependency Rule。",
    "bonus": "面试时<strong>讲清楚\"本质相同\"就能加分</strong>，区分初级和资深。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 7,
    "cats": [
      "微服务",
      "P0"
    ],
    "diff": "mid",
    "q": "什么时候应该用微服务？",
    "ans": "三个信号：<ol><li>团队 &gt; 50 人，多团队并行阻塞</li><li>模块扩展需求差异巨大</li><li>不同模块发布节奏差异大</li></ol>",
    "trap": "<strong>Fowler \"Monolith First\"</strong>：先单体，撑不住再拆。<strong>30 人以下团队上微服务是过度设计</strong>。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 8,
    "cats": [
      "ADR",
      "P1"
    ],
    "diff": "basic",
    "q": "ADR 的核心三段是什么？",
    "ans": "<strong>Context</strong>（背景和约束） + <strong>Decision</strong>（决定做什么） + <strong>Consequences</strong>（正负面后果）。",
    "bonus": "ADR 一旦 Accepted <strong>永不删除</strong>——历史是资产；改变决策写新 ADR 标记 \"Superseded by\"。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 9,
    "cats": [
      "演进式架构",
      "P1"
    ],
    "diff": "high",
    "q": "Fitness Function 是什么？给一个例子。",
    "ans": "把架构原则<strong>写成自动化测试 / CI 检查</strong>。",
    "code": "<pre># 防止 Domain 层意外依赖 Infrastructure\ngrep -r \"infra/\" src/domain/ &amp;&amp; exit 1</pre>",
    "bonus": "<strong>让机器守护架构</strong>是防止腐化的唯一可靠手段——人会忘记，工具不会。",
    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 10,
    "cats": [
      "重构",
      "P1"
    ],
    "diff": "high",
    "q": "Strangler Fig 模式怎么运作？",
    "ans": "渐进式替换遗留系统：<ol><li>建 Facade 拦截所有调用</li><li>用 Feature Flag 控制流量到新/旧实现</li><li>影子流量对账</li><li>灰度切流</li><li><strong>必须设 decommission deadline</strong>，到期删旧代码</li></ol>",

    "ref": "../architect/architecture_methodology"
  },
  {
    "id": 11,
    "cats": [
      "DDD 战略",

const STORE_KEY = 'architect_interview_mastered';
let mastered = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));

let activeCats = new Set();
let activeDiffs = new Set();
let hideMasteredFlag = false;

const allCats = [...new Set(CARDS.flatMap(c => c.cats))].sort();


function renderFilters() {
  const container = document.getElementById('categoryGroupContainer');
  const catCount = {};
  CARDS.forEach(c => c.cats.forEach(t => { catCount[t] = (catCount[t]||0) + 1; }));
  const used = new Set();
  let html = '';
  for (const group of CAT_GROUPS) {
    const validCats = group.cats.filter(c => catCount[c]);
    if (!validCats.length) continue;
    validCats.forEach(c => used.add(c));
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">${group.name}</strong>
      ${validCats.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  const rest = allCats.filter(c => !used.has(c));
  if (rest.length) {
    html += `<div class="filters" style="padding:.3rem 0;">
      <strong style="color:var(--text-dim);font-size:.75rem;align-self:center;min-width:170px;">📌 其它</strong>
      ${rest.map(c => `<span class="chip" onclick="toggleCat('${c}', this)">${c} <small style="opacity:.6">(${catCount[c]})</small></span>`).join('')}
    </div>`;
  }
  container.innerHTML = html;
}

function renderCards() {
  const html = CARDS.map(c => {
    const diffLabel = {basic:'🟢 基础', mid:'🟡 中级', high:'🔴 高级'}[c.diff];
    const tags = c.cats.map(t => `<span class="card-cat">${t}</span>`).join('');
    const isMastered = mastered.has(c.id);
    return `
      <div class="card diff-${c.diff} ${isMastered?'mastered':''}" data-id="${c.id}" data-diff="${c.diff}" data-cats="${c.cats.join('|')}">
        <div class="card-header">
          <span class="card-id">#${String(c.id).padStart(3,'0')}</span>
          <span class="card-tag ${c.diff}">${diffLabel}</span>
          ${tags}
          <div class="card-actions">
            <button class="mastered-btn ${isMastered?'on':''}" onclick="toggleMaster(${c.id}, this)">${isMastered?'✓ 已掌握':'标为已掌握'}</button>
          </div>
        </div>
        <div class="question" onclick="toggleExpand(this)">${c.q}</div>
        <div class="answer">
          <h4>📝 标准答案</h4>
          <div>${c.ans}</div>
          ${c.code ? `<h4 class="code">💻 示例</h4>${c.code}` : ''}
          ${c.bonus ? `<h4 class="bonus">⭐ 加分点 / 进阶</h4><div>${c.bonus}</div>` : ''}
          ${c.trap ? `<h4 class="trap">⚠️ 常见陷阱</h4><div>${c.trap}</div>` : ''}
          ${typeof MICardExtras !== 'undefined' ? MICardExtras.render(c) : ''}
          ${c.ref ? `<div class="ref">📚 深度阅读: <a href="${c.ref}.html" target="_blank" rel="noopener" onclick="event.stopPropagation()"><strong>${c.ref.split('/').pop()}.html</strong></a></div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('cards').innerHTML = html;
  updateStats();
}

function toggleExpand(el) { el.parentElement.classList.toggle('expanded'); }
function expandAll()   { document.querySelectorAll('.card:not(.hidden)').forEach(c => c.classList.add('expanded')); }
function collapseAll() { document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded')); }

function toggleMaster(id, btn) {
  if (mastered.has(id)) mastered.delete(id); else mastered.add(id);
  localStorage.setItem(STORE_KEY, JSON.stringify([...mastered]));
  const card = btn.closest('.card');
  card.classList.toggle('mastered', mastered.has(id));
  btn.classList.toggle('on', mastered.has(id));
  btn.textContent = mastered.has(id) ? '✓ 已掌握' : '标为已掌握';
  if (hideMasteredFlag) filter();
  updateStats();
}

function resetMastered() {
  if (!confirm('清空所有"已掌握"标记?')) return;
  mastered.clear();
  localStorage.setItem(STORE_KEY, '[]');
  document.querySelectorAll('.card.mastered').forEach(c => c.classList.remove('mastered'));
  document.querySelectorAll('.mastered-btn.on').forEach(b => { b.classList.remove('on'); b.textContent = '标为已掌握'; });
  updateStats();
}

function hideMastered() {
  hideMasteredFlag = !hideMasteredFlag;
  const btn = document.getElementById('hideMasteredBtn');
  btn.classList.toggle('active', hideMasteredFlag);
  btn.textContent = hideMasteredFlag ? '显示已掌握' : '隐藏已掌握';
  filter();
}

function toggleCat(cat, el) {
  if (activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat);
  el.classList.toggle('active');
  filter();
}

function toggleDiff(d, el) {
  if (activeDiffs.has(d)) activeDiffs.delete(d); else activeDiffs.add(d);
  el.classList.toggle('active');
  filter();
}

function filter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const id = +card.dataset.id;
    const diff = card.dataset.diff;
    const cats = card.dataset.cats.split('|');
    const text = card.textContent.toLowerCase();
    let show = true;
    if (activeCats.size > 0 && !cats.some(c => activeCats.has(c))) show = false;
    if (activeDiffs.size > 0 && !activeDiffs.has(diff)) show = false;
    if (q && !text.includes(q)) show = false;
    if (hideMasteredFlag && mastered.has(id)) show = false;
    card.classList.toggle('hidden', !show);
  });
  updateStats();
}

function randomize() {
  const visible = [...document.querySelectorAll('.card:not(.hidden)')];
  if (visible.length === 0) return;
  const pick = visible[Math.floor(Math.random() * visible.length)];
  collapseAll();
  pick.classList.add('expanded');
  pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateStats() {
  const total = CARDS.length;
  const visible = document.querySelectorAll('.card:not(.hidden)').length;
  const m = mastered.size;
  document.getElementById('stats').innerHTML =
    `共 ${total} 题 · 当前显示 ${visible} 题 · 已掌握 ${m}/${total} (${(m/total*100).toFixed(0)}%)`;
}

renderFilters();
renderCards();
</script>
</body>
</html>
