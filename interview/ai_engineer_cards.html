<script>
const CARDS = [
/* ============= 模型原理 18 题 ============= */
{id:1,cats:["模型原理"],diff:"basic",q:"为什么 attention 公式要除以 √d_k？",
ans:"<b>核心</b>：iid 假设下 Q·K 点积方差 = d_k，量级 = √d_k。如果不除，d_k 大时 softmax 输入差距大，输出近 one-hot，<em>梯度饱和模型学不动</em>。除 √d_k 让方差归一回 1。",
bonus:"除 d 会让分布过平 → attention 失去选择性；除 d² 会让 softmax 完全均匀 → 等于平均池化。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch2'>X06 Ch2 §2.3</a>"},

{id:2,cats:["模型原理"],diff:"basic",q:"KV-Cache 显存怎么算？为什么需要它？",
ans:"<b>公式</b>：<code>2 × n × L × H × d_h × bytes</code>。Llama-70B 32k 上下文 MHA = 84GB，单 H100 装不下。<br><b>为什么需要</b>：不缓存的话每生成 1 token 都要重算所有历史 K/V，O(n³) 不可用。缓存让复杂度降到 O(n²)。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch3'>X06 Ch3</a>"},

{id:3,cats:["模型原理"],diff:"basic",q:"RoPE 为什么比 Sinusoidal/Absolute 位置编码好？",
ans:"<b>核心</b>：RoPE 编码<em>相对位置</em>（q_m·k_n 只依赖 m-n），而前两者编码绝对位置。<em>相对位置更符合语言本质</em>，且对未见过长度外推更稳（配合 YaRN）。",
bonus:"具体做法：把 Q/K 每相邻两个维度看成 2D 平面向量，按位置 m 旋转 m·θ 角。点积自动消掉绝对位置项。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch4'>X06 Ch4</a>"},

{id:4,cats:["模型原理"],diff:"mid",q:"MHA / MQA / GQA / MLA 4 种 attention 变体区别？",
ans:"都是为了砍 KV-Cache：<br><b>MHA</b>: H 个 Q heads × H 个 KV heads，最准但 cache 最大<br><b>MQA</b>: H 个 Q heads × 1 个 KV head，cache 减 H 倍但效果掉<br><b>GQA</b>（事实标准）: H 个 Q heads × H/g 个 KV heads（典型 g=8），效果接近 MHA，cache 减 8x<br><b>MLA</b>（DeepSeek）: 存压缩 latent，临时还原 K/V，cache 比 GQA 还小一半，效果略好",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch5'>X06 Ch5</a>"},

{id:5,cats:["模型原理"],diff:"high",q:"FlashAttention 为什么快？跟 Sparse Attention 区别？",
ans:"<b>FA</b>：用 <em>tiling + online softmax</em> 避免实例化 n×n 矩阵到 HBM，靠减少 HBM↔SRAM 数据搬运提速。<em>数学完全等价标准 attention</em>，不是近似。<br><b>Sparse</b>：数学上不同（只算部分 token pair），是 approximation，可能掉精度。",
bonus:"FA v3 (2024) 用 H100 Tensor Core + WGMMA + warp-specialization + FP8，相比 v2 再 +1.5-2x。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch6'>X06 Ch6</a>"},

{id:6,cats:["模型原理"],diff:"basic",q:"RMSNorm 跟 LayerNorm 区别？",
ans:"RMSNorm 不算均值，只用 RMS 归一。计算少 ~25%，参数少 1 个 bias，效果实证持平。2026 几乎所有新模型都用 RMSNorm（Llama / Qwen / DeepSeek）。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#s7-1'>X06 §7.1</a>"},

{id:7,cats:["模型原理"],diff:"mid",q:"SwiGLU 比 ReLU FFN 好在哪？代价？",
ans:"<b>优势</b>：引入 gating 分支 <code>(Swish(xW₁) ⊙ xW₃) W₂</code>，模型能动态决定哪些维度起作用，效果 +1-2%。<br><b>代价</b>：3 个权重矩阵 vs 2 个，FFN 参数和计算 +50%（实际为保持参数量，中间维度缩到 8/3 d）。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#s7-2'>X06 §7.2</a>"},

{id:8,cats:["模型原理"],diff:"high",q:"MoE 模型推理时为什么激活参数远小于总参数？工程挑战？",
ans:"<b>原理</b>：每 token 经 router 只选 top-k expert（k 远小于 N），单步只激活 k/N 参数。<br><b>挑战</b>：① 所有 expert 都要装显存 ② 不同 token 路由到不同 expert，batch 内部分 GPU 空闲，需要 expert parallelism ③ Load balancing 防 dead expert。",
trap:"DeepSeek-V3 671B/37B 激活 5.5%，比 Mixtral 28% 更极致 — 推理 cost 接近 30B dense。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#s7-3'>X06 §7.3</a>"},

{id:9,cats:["模型原理"],diff:"high",q:"DeepSeek-V3 跟 Llama 3 70B 架构上几个核心差异？",
ans:"5 个差异：① MLA vs GQA ② MoE 671B/37B vs Dense 70B ③ MTP（Multi-Token Prediction）训练目标 vs next-token ④ FP8 mixed precision 训练 vs BF16 ⑤ 训练数据中推理样本占比 DeepSeek 高。",
bonus:"DeepSeek-V3 训练成本 ~$5.6M (vs GPT-4 据传 $100M+)，证明 architecture + data + training 三方面创新都能省钱。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch8'>X06 Ch8</a>"},

{id:10,cats:["模型原理"],diff:"mid",q:"长上下文（128k+）的工程难点？业界 work-around？",
ans:"<b>3 难点</b>：① Attention O(n²) ② KV-Cache TB 级 ③ 'lost in the middle'。<br><b>Work-around</b>：YaRN 外推 + GQA/MLA + KV 量化 + Sliding Window + Ring Attention + 大场景下用 <em>RAG 替代纯长上下文</em>。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch9'>X06 Ch9</a>"},

{id:11,cats:["模型原理"],diff:"high",q:"Reasoning Model (o1 / R1) 跟 CoT prompting 本质区别？",
ans:"<b>CoT</b>：提示工程层引导，模型未经训练，每次都需要 prompt 提示。<br><b>Reasoning</b>：训练层用 RL 让模型学会自适应长度的 thinking，不需要 prompt 提示，能根据题难度调节 thinking 长度。<br><b>代价</b>：response 长度变成原来 10-100 倍，latency 和 cost 飙升。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch10'>X06 Ch10</a>"},

{id:12,cats:["模型原理"],diff:"mid",q:"Multi-Head Attention 为什么不用 1 个 D 维 attention？",
ans:"softmax 让每个 attention 分布<em>倾向于集中在少数 token</em>。1 个 head 只能学一种关注模式；多 head 让每个 head 专注一种模式（语法/指代/情感…），<em>表达力大幅提升</em>。",
bonus:"GPT-3 175B 用 H=96 d_h=128，是经验最优。head 太多每个维度太小学不出东西，head 太少表达力受限。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#s2-4'>X06 §2.4</a>"},

{id:13,cats:["模型原理"],diff:"basic",q:"Causal Mask 是什么？为什么 decoder 需要？",
ans:"语言模型是自回归（一次生成 1 个 token），只能看历史不能看未来。Causal Mask 把 attention 矩阵上三角填 -∞，softmax 后变 0，<em>让 token i 只能 attend 0..i</em>。Encoder（如 BERT）双向，无需 causal mask。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch2'>X06 Ch2</a>"},

{id:14,cats:["模型原理"],diff:"mid",q:"为什么 Prefill 是 compute-bound 而 Decode 是 memory-bound？",
ans:"<b>Prefill</b>：处理 n 个 token 同时，attention 是 n×n GEMM，算力密集。<br><b>Decode</b>：每步只算 1 token attention，但要读整个 KV-Cache（GB 级），arithmetic intensity = FLOPs/Bytes 极低，带宽瓶颈。<br><b>优化方向不同</b>：Prefill 用 FlashAttention / FP8；Decode 用 GQA / MLA / KV 量化 / Spec Decoding。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch11'>X06 Ch11</a>"},

{id:15,cats:["模型原理"],diff:"basic",q:"什么是 YaRN？为什么能支持长上下文？",
ans:"YaRN 是 RoPE 的扩展。原理：RoPE 不同维度对应不同频率，YaRN <em>对高频维度保持，低频维度缩小</em>，让模型用熟悉的'角度范围'去表达更长的距离。Llama 3.1 用类似技术从 8k 扩到 128k。",
trap:"几乎所有'宣称支持百万上下文'的模型本质都是'短上下文训练 + 位置编码外推 + 长上下文微调'，不是从零训百万。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch4'>X06 Ch4</a>"},

{id:16,cats:["模型原理"],diff:"mid",q:"MTP (Multi-Token Prediction) 是什么？为什么 DeepSeek-V3 用？",
ans:"训练时<em>一步预测多个 token</em>而不是只下一个。优点：① 训练效率 +30%（一步多个监督信号）② 推理时可结合 Speculative Decoding 提速。DeepSeek-V3 首个大规模用。",
ref:"<a href='../ai-native/transformer_llm_architecture.html#ch8'>X06 Ch8</a>"},

{id:17,cats:["模型原理"],diff:"high",q:"为什么 MoE 模型用 expert parallelism？All-to-All 通信是什么？",
ans:"MoE 几十-几百个 expert 不可能装单卡，<em>EP 把不同 expert 切到不同 GPU</em>。每层 forward 要做 <b>All-to-All</b>：把每个 token 发到对应 expert 所在卡（dispatch），算完再发回原卡（combine）。每层 2 次 All-to-All，跨节点会成为瓶颈。",
ref:"<a href='../ai-infra/distributed_training.html#ch7'>Y03 Ch7</a>"},

{id:18,cats:["模型原理"],diff:"basic",q:"Pretrain 和 Fine-tune 的本质区别？",
ans:"<b>Pretrain</b>：从随机初始化或继续训，学'通用语言能力'。数据 trillion 级，目标 next-token prediction。<br><b>Fine-tune</b>：基于 pretrain checkpoint 微调，<em>学特定任务/风格/对齐</em>。数据 10k-1M，目标更窄（SFT / DPO 等）。Cost 差 100-1000 倍。",
ref:"<a href='../ai-native/llm_training.html#ch1'>X07 Ch1</a>"},

/* ============= 训练 15 题 ============= */
{id:19,cats:["训练"],diff:"basic",q:"LLM 训练 4 个阶段是什么？",
ans:"① <b>Pretrain</b>：next-token prediction 学语言，10-20T token，cost $1M-100M+<br>② <b>SFT</b>：模仿对话格式，10k-1M 样本，cost $1k-100k<br>③ <b>Reward Model</b>：把人类偏好量化成评分函数<br>④ <b>RLHF / DPO / GRPO</b>：让 LLM 朝 reward 高的方向优化",
ref:"<a href='../ai-native/llm_training.html#ch1'>X07 Ch1</a>"},

{id:20,cats:["训练"],diff:"basic",q:"Chinchilla scaling law 是什么？为什么重要？",
ans:"给定 compute 预算，<b>最优 = 参数:数据 ≈ 1:20</b>。即 7B 模型应训 140B token。<br><b>历史影响</b>：GPT-3 175B 只训 300B token 严重欠拟合；Chinchilla 70B 训 1.4T 反超 GPT-3。之后所有模型都按 Chinchilla 比例训，甚至超训（Llama 2 7B 训 2T = 14x 过比例但效果好）。",
ref:"<a href='../ai-native/llm_training.html#s2-1'>X07 §2.1</a>"},

{id:21,cats:["训练"],diff:"mid",q:"LoRA SFT 跟全参数 SFT 区别？为什么主流用 LoRA？",
ans:"<b>LoRA</b>：在 W 旁边加 B@A 低秩矩阵（典型 r=8），只训 1-10M 参数 vs 70B。<br><b>优势</b>：训练快 5-10x / 显存少 10x / multi-LoRA serving 可以同 base 多用户独立 LoRA / 效果 90-95% 全参数。",
ref:"<a href='../ai-native/llm_training.html#ch3'>X07 Ch3</a>"},

{id:22,cats:["训练"],diff:"high",q:"DPO 跟 RLHF (PPO) 区别？为什么 2024+ 主流转 DPO？",
ans:"<b>RLHF/PPO</b>：需要单独训 RM + PPO 调度 4 个模型（actor/critic/RM/reference），复杂，难调，但效果上限最高。<br><b>DPO</b>：直接用偏好对训练 LLM，<em>不需要 RM 也不需要 PPO</em>，只需 2 个模型（actor + reference），100 行代码搞定。<br><b>转向原因</b>：实现简单 10x + 稳定 + 效果 90-95% PPO。开源社区已全面转 DPO，PPO 只在顶级 lab 用。",
ref:"<a href='../ai-native/llm_training.html#ch5'>X07 Ch5</a>"},

{id:23,cats:["训练"],diff:"high",q:"DeepSeek R1 训练范式跟 OpenAI o1 有什么不同？",
ans:"<b>o1</b>：训练细节不公开。猜测 process reward model 监督每一步推理 + 复杂 RL pipeline。<br><b>R1</b>：完全公开。<em>纯 GRPO + rule-based reward</em>（只看最终答案对/错）就让 reasoning 涌现。R1-Zero 不需要任何 SFT。后加少量 SFT + 多轮 RL 提升可读性。",
bonus:"R1 证明不需要 process reward model 也能训 reasoning，给中小公司打开了门。",
ref:"<a href='../ai-native/llm_training.html#ch7'>X07 Ch7</a>"},

{id:24,cats:["训练"],diff:"mid",q:"Reward Hacking 是什么？怎么避免？",
ans:"<b>是什么</b>：RLHF 训练时 LLM <em>找 RM 的漏洞</em>来骗高分。例：RM 偏爱长答案 → LLM 故意答 800 字废话。<br><b>避免</b>：① RM 训练数据 broader 多样化 ② KL 约束（β 控制偏离 reference 多远）③ multi-objective reward ④ 持续用真实用户反馈校准 RM。",
ref:"<a href='../ai-native/llm_training.html#ch4'>X07 Ch4</a>"},

{id:25,cats:["训练"],diff:"basic",q:"Constitutional AI 是什么？跟 RLHF 区别？",
ans:"Anthropic 提出。定义一份'宪法'（10-30 条原则），让 LLM <em>自己对照宪法批改自己的回答</em>，生成'改进版'。用 (原版 vs 改进版) 当偏好对训练。<br><b>vs RLHF</b>：RLHF 需要大量人工标注（贵）；CAI 用 LLM 自己当 RM (RLAIF)，cost 低 10-100x。Claude 系列关键技术。",
ref:"<a href='../ai-native/llm_training.html#ch6'>X07 Ch6</a>"},

{id:26,cats:["训练"],diff:"mid",q:"SFT 数据合成（self-instruct）怎么做？质量怎么保证？",
ans:"<b>流程</b>：① 人工写 ~200 种子 (instruction, response) ② 用 GPT-4 生成新 instruction ③ 用 GPT-4 回答 ④ LLM-as-Judge 过滤 ⑤ 100k-10M 数据。<br><b>质量</b>：① 用最强模型生成 ② 多样性 prompt ③ 多轮 filter + 人工抽检 ④ 任务覆盖均衡。",
ref:"<a href='../ai-native/llm_training.html#ch3'>X07 Ch3</a>"},

{id:27,cats:["训练"],diff:"high",q:"catastrophic forgetting 是什么？SFT/RLHF 怎么避免？",
ans:"<b>是什么</b>：在新任务上 fine-tune 后，原有能力大幅退化（如做对话 fine-tune 后代码能力掉一半）。<br><b>避免</b>：① 训练数据 broader 多领域混合 ② 加大 KL 约束（DPO 的 β）③ LoRA 而不是 full fine-tune ④ eval 必须 multi-domain ⑤ rehearsal（保留少量 pretrain 数据混入）。",
ref:"<a href='../ai-native/llm_training.html#ch9'>X07 Ch9</a>"},

{id:28,cats:["训练"],diff:"mid",q:"为什么大模型训练 80% 靠数据？",
ans:"① 数据质量差再大模型也学不出好能力 ② 数据多样性决定 generalization ③ 数据 distribution 决定模型偏好 ④ 数据 cleaning + dedup 直接影响 loss curve。<br>架构创新 + 训练算法等 20% 决定'同样数据下能多接近上限'。",
ref:"<a href='../ai-native/llm_training.html#ch8'>X07 Ch8</a>"},

{id:29,cats:["训练"],diff:"basic",q:"Reward Model 训练数据是什么格式？",
ans:"每条 = 1 个 prompt + 2 个候选回答 + 标注'哪个更好'。<br>训练目标：让 <code>score(prompt, chosen) > score(prompt, rejected)</code>。<br>Loss: <code>-log(sigmoid(rm(p, chosen) - rm(p, rejected)))</code>。",
ref:"<a href='../ai-native/llm_training.html#ch4'>X07 Ch4</a>"},

{id:30,cats:["训练"],diff:"mid",q:"DPO Loss 公式是什么？怎么直觉理解？",
ans:"<code>loss = -log(sigmoid(β × (log(P_actor(chosen)/P_ref(chosen)) - log(P_actor(rejected)/P_ref(rejected)))))</code><br><b>直觉</b>：让 actor 相比 reference 更倾向 chosen 而非 rejected。β 控制偏离 reference 的强度。<em>不需要训 RM，直接用偏好对</em>。",
ref:"<a href='../ai-native/llm_training.html#s5-1'>X07 §5.1</a>"},

{id:31,cats:["训练"],diff:"high",q:"GRPO 跟 PPO 区别？为什么适合 reasoning？",
ans:"<b>PPO</b>：需要单独 RM + critic 估算 advantage。<br><b>GRPO</b>（DeepSeek 提出）：<em>同题让 LLM 生成 N 个答案，按对错排名互相比较算 advantage</em>，不需要 RM 也不需要 critic。<br><b>适合 reasoning</b>：数学/代码题有 rule-based 验证（对/错），不需要人工标注 reward。",
ref:"<a href='../ai-native/llm_training.html#ch5'>X07 Ch5</a>"},

{id:32,cats:["训练"],diff:"mid",q:"Pretrain 数据 curation 关键技术？",
ans:"① 质量过滤（用小 classifier 打分，剔除低质量 50-80%）② 去重（MinHash/SimHash 找近似重复，重复 hurt 训练）③ 多样性混合（典型 web 80% + code 7% + papers 3%）④ 课程学习（早期简单后期复杂）⑤ 去毒/去 PII。",
ref:"<a href='../ai-native/llm_training.html#ch8'>X07 Ch8</a>"},

{id:33,cats:["训练"],diff:"high",q:"训练中 Loss 突然 spike → NaN 怎么排查？",
ans:"<b>常见根因</b>：① 学习率太大 ② 某 batch 数据极端（超长样本 / 异常值）→ gradient explode ③ BF16 数值溢出 ④ 数据有 NaN 或 inf。<br><b>修复</b>：① gradient clipping (norm 1.0) ② 数据预处理过滤超长样本 ③ 降学习率 ④ checkpoint 回滚到 stable 点。<em>训练必须定期存 checkpoint</em>。",
ref:"<a href='../ai-native/llm_training.html#ch9'>X07 Ch9</a>"},

/* ============= 推理优化 15 题 ============= */
{id:34,cats:["推理优化"],diff:"basic",q:"vLLM 为什么比 huggingface naive 推理快 10x+？",
ans:"3 个工程优化（算法没变）：① PagedAttention 把显存利用率从 30% → 96%，能装更多并发 ② Continuous Batching 让快请求不等慢请求，GPU 利用率 25% → 80% ③ 自定义 CUDA kernel 提升单步性能。",
ref:"<a href='../ai-infra/inference_serving.html#ch1'>Y02 Ch1</a>"},

{id:35,cats:["推理优化"],diff:"mid",q:"PagedAttention 跟 OS 虚拟内存有什么相似？",
ans:"借鉴 OS 分页思想：① OS 虚拟页 ↔ 逻辑 KV block / 物理页 ↔ 物理 KV block / 页表 ↔ block table ② 都解决'地址连续但物理分散'问题 ③ 都用'按需分配 + 共享物理块'提升利用率。<br><b>差异</b>：OS 页 4KB / vLLM block 16 token；OS 由 MMU 硬件加速 / vLLM 由专用 CUDA kernel 实现。",
ref:"<a href='../ai-infra/inference_serving.html#s3-2'>Y02 §3.2</a>"},

{id:36,cats:["推理优化"],diff:"mid",q:"Continuous Batching 跟 Static Batching 区别？",
ans:"<b>Static</b>：N 个请求绑一起进 batch，必须等最慢的，'快的等慢的'浪费严重。<br><b>Continuous</b>：每个 decode step 都重新调度，完成的请求立刻空出 slot 让新请求进来。GPU 利用率 25% → 80%。<em>2026 在线 chat 都用 Continuous</em>。",
ref:"<a href='../ai-infra/inference_serving.html#ch4'>Y02 Ch4</a>"},

{id:37,cats:["推理优化"],diff:"high",q:"vLLM 的 preemption 机制是什么？怎么决定 evict 谁？",
ans:"<b>触发</b>：显存满，新 token 无法分配新 block。<br><b>策略</b>：① <b>Recompute</b>（默认）：丢掉某 sequence 的所有 KV-Cache，稍后从头 prefill ② <b>Swap</b>：把 KV-Cache 拷到 CPU memory，需要时拷回。<br><b>选谁</b>：按到达时间 FIFO（最晚到的最先牺牲）。",
ref:"<a href='../ai-infra/inference_serving.html#ch4'>Y02 Ch4</a>"},

{id:38,cats:["推理优化"],diff:"high",q:"Speculative Decoding 怎么工作？什么场景效果差？",
ans:"<b>原理</b>：小模型并行生成 K 个候选 token，大模型一次 forward 同时验证 K+1 个位置（attention 天然并行）。接受率高的话 1 次 forward 出 K 个 token。<br><b>差场景</b>：① reasoning model — 小模型猜不对 ② 多语言切换 ③ 高熵创意写作。<em>接受率 < 50% 时反而变慢</em>。",
ref:"<a href='../ai-infra/inference_serving.html#ch6'>Y02 Ch6</a>"},

{id:39,cats:["推理优化"],diff:"mid",q:"Prefix Caching 工作原理？什么场景效果好？",
ans:"<b>原理</b>：同 prefix 的 KV 算一次存物理 block，<em>多个请求的 block_table 前几项指向同一物理 block</em>（引用计数）。哪个请求开始'分叉'就分配新 block。<br><b>最适合</b>：① Chat (system prompt 重复) ② Few-shot ③ Agent multi-turn ④ RAG (chunk 重复)。SGLang RadixAttention 对此优化最深。",
ref:"<a href='../ai-infra/inference_serving.html#s3-4'>Y02 §3.4</a>"},

{id:40,cats:["推理优化"],diff:"high",q:"Prefill-Decode 分离架构 trade-off？",
ans:"<b>收益</b>：① 资源解耦（独立扩容）② SLO 隔离（新请求不影响老请求 latency）③ 硬件匹配（H100 做 prefill / A100 做 decode）④ 整体吞吐 +30-50%。<br><b>代价</b>：① KV-Cache 跨节点 RDMA 传输延迟 30-50ms ② 部署复杂度上升 ③ 故障域扩大 ④ 适合大规模，小规模 overhead 大。",
ref:"<a href='../ai-infra/inference_serving.html#ch5'>Y02 Ch5</a>"},

{id:41,cats:["推理优化"],diff:"mid",q:"vLLM vs SGLang vs TRT-LLM 怎么选？",
ans:"<b>vLLM</b>：通用默认，模型支持最广，OpenAI 兼容 API。<br><b>SGLang</b>：Agent / 多轮场景胜出（RadixAttention 对 prefix 共享优化更通用）。<br><b>TRT-LLM</b>：H100 极致性能但模型需要单独转换，部署复杂。",
ref:"<a href='../ai-infra/inference_serving.html#ch7'>Y02 Ch7</a>"},

{id:42,cats:["推理优化"],diff:"high",q:"vLLM vs SGLang 在 Agent 场景为什么 SGLang 胜？",
ans:"<b>SGLang</b>：RadixAttention 用基数树做 prefix 共享，<em>不只是前缀共享，任意 sub-tree 都能共享</em>。Agent multi-turn 对话有大量重复 sub-prompt（system + 历史 + 工具描述），命中率 70%+。<br><b>vLLM</b>：Automatic Prefix Caching 用 hash 表，只看完整 prefix 命中，Agent 命中率低。",
ref:"<a href='../ai-infra/inference_serving.html#ch7'>Y02 Ch7</a>"},

{id:43,cats:["推理优化"],diff:"basic",q:"KV-Cache 量化 INT4 / FP8 的 trade-off？",
ans:"<b>收益</b>：KV-Cache 显存 ÷ 4 (INT4) 或 ÷ 2 (FP8) → 装更多并发/更长上下文/更大 batch → throughput +50-100%。<br><b>代价</b>：精度损失：INT4 KV 一般 -1-2% accuracy，FP8 几乎无损。<em>越长上下文 INT4 累积误差越大</em>。",
ref:"<a href='../ai-infra/quantization.html#ch6'>Y04 Ch6</a>"},

{id:44,cats:["推理优化"],diff:"mid",q:"GPTQ / AWQ / SmoothQuant 区别？",
ans:"<b>GPTQ</b>：逐层量化 + Hessian 误差校正，仅 weight INT4。<br><b>AWQ</b>：识别 1% '关键 channel'（activation magnitude 大对应的）保留 FP16，其它 INT4。<em>精度优于 GPTQ</em>。<br><b>SmoothQuant</b>：同时量化 weight + activation (W8A8)，通过'挪 outlier 从 activation 到 weight'解决 activation 量化难题。",
ref:"<a href='../ai-infra/quantization.html#ch4'>Y04 Ch4</a>"},

{id:45,cats:["推理优化"],diff:"high",q:"为什么 H100 推 FP8 而不是 INT8？",
ans:"<b>动态范围</b>：INT8 [-128,127]，FP8 ±448。LLM activation 经常 extreme outlier（attention 输出几千），INT8 装不下要 clip 损失大，FP8 能装下。<br><b>硬件</b>：H100 + B200 内置 FP8 Tensor Core，算力是 FP16 的 2x。2026 训练+推理主流。",
ref:"<a href='../ai-infra/quantization.html#ch5'>Y04 Ch5</a>"},

{id:46,cats:["推理优化"],diff:"mid",q:"INT4 量化后什么场景质量掉得最多？",
ans:"<b>长尾</b>：① reasoning（数学/代码）→ 掉 5-20% ② 长上下文（&gt; 32k）→ 累积误差 ③ 稀少语言（小语种/方言）④ edge case。<br><b>主流场景</b>：普通对话/短问答/摘要 → 几乎无损 (&lt; 1%)。",
ref:"<a href='../ai-infra/quantization.html#ch9'>Y04 Ch9</a>"},

{id:47,cats:["推理优化"],diff:"basic",q:"QLoRA 是什么？怎么 work？",
ans:"'量化 base 模型 (INT4) + 训练 FP16 LoRA adapter'。让 70B 模型在 1 张 24GB 消费级 GPU 上能 fine-tune。<br><b>关键 trick</b>：① NF4 (NormalFloat 4-bit) 替代 INT4 ② Double Quantization（量化 scale 自己再量化）③ Paged Optimizer（CPU-GPU 切换避免 OOM）。",
ref:"<a href='../ai-infra/quantization.html#ch10'>Y04 §Q10</a>"},

{id:48,cats:["推理优化"],diff:"mid",q:"给 13B 模型 / A100 80GB / 4k 上下文，估算最大并发？",
ans:"模型参数 ~26GB (13B × 2)。KV-Cache per batch ≈ 2 × 4k × L(~40) × (32/8) × 128 × 2 ≈ 0.33 GB/seq。可用 80 - 26 - 4 = 50 GB，<b>max batch ≈ 150</b>。<br><b>加分</b>：提到 PagedAttention 能进一步提高有效 batch（减碎片）+ INT8 KV-Cache 量化可再翻倍到 ~300。",
ref:"<a href='../ai-infra/inference_serving.html#ch11'>Y02 Ch11</a>"},

/* ============= RAG 14 题 ============= */
{id:49,cats:["RAG"],diff:"basic",q:"RAG 解决了 LLM 什么问题？为什么不直接微调？",
ans:"<b>RAG 解决</b>：① 知识过期 ② 幻觉 ③ 私有数据。<br><b>vs 微调</b>：微调贵+知识更新慢+没法引用出处。RAG 适合'事实查询'，微调适合'风格/复杂任务理解'。<em>生产经常 RAG + 轻微调结合</em>。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch1'>X08 Ch1</a>"},

{id:50,cats:["RAG"],diff:"basic",q:"chunk 太大或太小会怎么样？",
ans:"<b>太大</b>：① 信息密度低，检索精度下降 ② context 长 → LLM 'lost in the middle' ③ chunk 数少 → 召回多样性差。<br><b>太小</b>：① 语义不完整，单独看不懂 ② chunk 多 → 检索慢 ③ 上下文丢失（代词 '它' 找不到指代）。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch3'>X08 Ch3</a>"},

{id:51,cats:["RAG"],diff:"mid",q:"为什么需要 Hybrid Search？BM25 跟 Dense 区别？",
ans:"<b>BM25</b>：关键字+倒排，擅长精确匹配（版本号/ID/代码/专有名词），差在近义词。<br><b>Dense</b>：embedding 语义相似度，擅长跨语言/释义改写，差在精确版本号。<br><b>Hybrid</b>：两路并行召回 + RRF 融合。Recall@10 从 55% (BM25) / 70% (Dense) → 85% (Hybrid)。生产标配。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch5'>X08 Ch5</a>"},

{id:52,cats:["RAG"],diff:"mid",q:"Cross-Encoder Rerank 跟 Bi-Encoder 召回区别？为什么不直接 Cross-Encoder？",
ans:"<b>Bi-Encoder</b>：query/doc 分别编码成向量，余弦相似度。doc 向量可预先存库，1ms/query。<br><b>Cross-Encoder</b>：query+doc 拼起来过模型直接输出分数。精度高（NDCG +10-20%），但 50-200ms/pair。<br><b>为什么两阶段</b>：10 万文档全部 Cross-Encoder = 几千秒不可用。先 Bi-Encoder 召回 100 个，再 Cross-Encoder 精排到 top-5。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch6'>X08 Ch6</a>"},

{id:53,cats:["RAG"],diff:"high",q:"你的 RAG 准确率从 60% 提到 90%，具体改了什么？",
ans:"5 步：① 建 eval set（先知道现状）② 智能 Chunking（按段落+overlap 替代固定 1000）+ 5-10% ③ Hybrid Search（加 BM25+RRF）+10-15% ④ Cross-Encoder Rerank +10-20% ⑤ Prompt 优化（强约束基于文档）减幻觉。",
bonus:"加分：'每步都用 eval 验证不是凭感觉调' + 讲 1 个失败 case 修复细节。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch10'>X08 Ch10</a>"},

{id:54,cats:["RAG"],diff:"mid",q:"RAG 评测的核心 metric？怎么算 Faithfulness？",
ans:"<b>4 metric</b>：Context Precision / Context Recall / Faithfulness / Answer Relevance。<br><b>Faithfulness</b>：'答案里每个事实是否在 context 中找到支撑'。RAGAS 实现：LLM 把答案拆 atomic statements，每个判断是否被 context 支持，<em>支持数/总数 = Faithfulness</em>。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch8'>X08 Ch8</a>"},

{id:55,cats:["RAG"],diff:"basic",q:"GraphRAG 适合什么场景？为什么不普及？",
ans:"<b>适合</b>：实体关系密集领域（医学/法律/企业知识图谱），需要多跳推理的查询。<br><b>为什么不普及</b>：预处理建图很贵（实体识别+关系抽取+一致性维护）。大部分业务用普通 hybrid RAG 已够，GraphRAG ROI 不高。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch7'>X08 Ch7</a>"},

{id:56,cats:["RAG"],diff:"mid",q:"长 context (128k) 能不能替代 RAG？",
ans:"<b>理论</b>：可以。Gemini 1.5 / Qwen2.5-1M 塞整库进去就行。<br><b>实际</b>：① cost 飞涨（按 token × 100k 计）② latency 飞涨 ③ 'lost in the middle' 精度掉 ④ 知识库 GB 级 128k 也装不下。<br><b>2026 共识</b>：RAG + 中等上下文（8k-32k）比纯长上下文更经济。Agent 场景例外。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch11'>X08 Ch11</a>"},

{id:57,cats:["RAG"],diff:"high",q:"用户问 'v2.5 API 怎么调'，RAG 召回 v2.3 内容，怎么修？",
ans:"<b>原因</b>：'v2.5' 和 'v2.3' embedding 太近 dense 分不清。<br><b>修复</b>：① 预处理把版本号提到 metadata（chunk.version='v2.5'）② query 解析提取版本号（正则/LLM）③ 检索时强制 filter（where version='v2.5'）④ 再 hybrid + rerank。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch9'>X08 Ch9</a>"},

{id:58,cats:["RAG"],diff:"mid",q:"Embedding 模型怎么选？BGE vs OpenAI vs Qwen3？",
ans:"<b>看场景</b>：① 中文 → Qwen3-Embedding 或 BGE-Large-zh ② 多语言 → BGE-M3 ③ 英文 → NV-Embed-v2 ④ 商业 SaaS → OpenAI / Cohere ⑤ 国内合规 → 必用开源。<br><b>实战 tip</b>：不要直接选 MTEB 第一，<em>在你的业务 eval set 上测 3-5 个</em>，实际 recall 才数。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch4'>X08 Ch4</a>"},

{id:59,cats:["RAG"],diff:"mid",q:"为什么 2026 招聘官看到 'LangChain' 是减分项？",
ans:"① LangChain 抽象层太多，调试困难 ② 默认配置生产不可用 ③ 性能开销大（深 callback 链）④ 频繁 breaking change ⑤ 用 LangChain 表示你'复制粘贴 demo'，没自己设计。<br><b>应对</b>：简历写'用过但自研替代，启动 12s → 0.4s' 或 '用 LlamaIndex'。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch11'>X08 Ch11</a>"},

{id:60,cats:["RAG"],diff:"high",q:"RAG 上线 1 月准确率从 90% → 70%，怎么排查？",
ans:"5 步：① 检查输入分布（用户问题变了？促销季新问题？）② 检查知识库（新加 chunk 质量？错误 chunk 拉低召回？）③ 检查检索召回率（top-10 多少相关？）④ 检查 LLM（API 升级？prompt 改了？）⑤ 抓 100 失败 case 手动分析根因归类。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch11'>X08 Ch11</a>"},

{id:61,cats:["RAG"],diff:"basic",q:"HyDE 是什么？解决什么问题？",
ans:"Hypothetical Document Embeddings。问题：query 短/查询风格跟文档风格不匹配，embedding 距离远。<br><b>HyDE</b>：先让 LLM 生成一个'假答案'（不要求准），把这个假答案 embedding 去检索 — <em>'假答案'语言风格更接近文档</em>，召回率显著提升。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch7'>X08 Ch7</a>"},

{id:62,cats:["RAG"],diff:"mid",q:"Self-RAG 跟普通 RAG 区别？",
ans:"<b>普通 RAG</b>：不管检索质量都给 LLM。<br><b>Self-RAG</b>：LLM 先评估'这个检索结果够不够好'，不够好就<em>重新检索、改写 query 或承认'我不知道'</em>。<br>代价：+1-3 次 LLM 调用，cost 涨。",
ref:"<a href='../ai-native/rag_deep_dive.html#ch7'>X08 Ch7</a>"},

/* ============= Agent 12 题 ============= */
{id:63,cats:["Agent"],diff:"basic",q:"MCP 跟 Function Calling 区别？",
ans:"<b>Function Calling</b>：各 LLM SDK 内置（OpenAI/Claude/Gemini 各家不同），需要为每个模型写适配。属于 'SDK API' 层。<br><b>MCP</b>：跨模型标准协议（JSON-RPC 2.0 over stdio/SSE）。1 个 MCP server 所有支持 MCP 的 agent 都能用。属于'网络协议'层。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch2'>X09 Ch2</a>"},

{id:64,cats:["Agent"],diff:"basic",q:"MCP 的 3 个核心概念是什么？",
ans:"① <b>Tools</b>：agent 主动调用会改世界（write_file/send_email）<br>② <b>Resources</b>：agent 选择性读取不改世界（list_files/read_file）<br>③ <b>Prompts</b>：标准模板，用户选 agent 填（code_review/bug_report）",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#s3-2'>X09 §3.2</a>"},

{id:65,cats:["Agent"],diff:"mid",q:"ReAct 跟 Plan-Execute 区别？什么时候用哪个？",
ans:"<b>ReAct</b>：Reason → Act → Observe → Reason 循环，每步根据观察决定下一步。灵活但易迷路。<br><b>Plan-Execute</b>：先全局规划所有步骤，再按计划执行。稳定但不灵活。<br><b>选型</b>：简单任务 ReAct，复杂多步任务 Plan-Execute，高级用 Plan + Reflection 混合。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch4'>X09 Ch4</a>"},

{id:66,cats:["Agent"],diff:"high",q:"Agent Skills 是什么？跟 MCP 关系？",
ans:"<b>Skills</b>：把专家工作流+prompt+tools+知识打包成可加载单元。让通用 LLM '装上 APP' 变专家。Anthropic/Cursor/OpenAI 都有自己范式。<br><b>关系</b>：互补不互斥。<em>Skills 定义'做什么+怎么做'，MCP 提供'用什么工具'</em>。Skills 是应用层，MCP 是协议层。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch6'>X09 Ch6</a>"},

{id:67,cats:["Agent"],diff:"mid",q:"Computer Use 跟 MCP 比，什么场景用 Computer Use？",
ans:"<b>规则</b>：有 API → MCP。无 API（只有 GUI）→ Computer Use。<br><b>代价</b>：Computer Use 比 MCP 慢 5-20x，贵 10-100x，错误率高。是兜底方案。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch5'>X09 Ch5</a>"},

{id:68,cats:["Agent"],diff:"mid",q:"MCP server 用 stdio 跟 SSE 怎么选？",
ans:"<b>stdio</b>：本地子进程，简单+安全（无网络暴露）。大部分本地工具用这个。<br><b>SSE</b>：HTTP Server-Sent Events，支持远程。适合接公司内部服务、跨机器 agent，需要鉴权。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch3'>X09 Ch3</a>"},

{id:69,cats:["Agent"],diff:"high",q:"MCP 为什么 4 个月席卷 AI 圈？",
ans:"4 原因：① 真正标准化（Anthropic 不抢主导，spec 开放）② 简单（JSON-RPC over stdio，1 小时上手）③ 生态爆发（4 个月 300+ 社区 server）④ 解决真痛点（每团队都在写脏代码接公司工具）。<br><b>大平台采纳</b>：Cursor/Claude Desktop/Cline 立刻接入提供分发。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#s3-1'>X09 §3.1</a>"},

{id:70,cats:["Agent"],diff:"mid",q:"团队级 Agent 工程化 4 步？",
ans:"① Skills 放 git 仓库走 code review ② MCP server 容器化 + docker compose 一键 up ③ 权限严格隔离（read-only/sandbox/audit log）④ Skill 使用监控 + eval 持续迭代。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch7'>X09 Ch7</a>"},

{id:71,cats:["Agent"],diff:"high",q:"你的 MCP server 给 agent 操作生产数据库，怎么保证安全？",
ans:"5 道防线：① 权限最小化（read-only role）② 查询白名单（只 SELECT 禁 DDL）③ 速率限制（避免失控大量查询拖垮 DB）④ 审计日志（who/what/when 可追溯）⑤ 影响范围隔离（read replica 而非 master）。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch10'>X09 Q10</a>"},

{id:72,cats:["Agent"],diff:"mid",q:"Agent 的 5 种 tool use 模式？",
ans:"① <b>Single Call</b> ② <b>Parallel Tool Calls</b>（同时调 2+ 工具）③ <b>Sequential ReAct</b>（第二个依赖第一个结果）④ <b>Plan-Execute</b>（先规划再执行）⑤ <b>Agentic Loop with Reflection</b>（失败后反思调整，Cursor / Devin 模式）。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch4'>X09 Ch4</a>"},

{id:73,cats:["Agent"],diff:"basic",q:"Multi-Agent 系统的常见模式？",
ans:"① <b>Pipeline</b>（顺序执行，前一个输出给下一个）② <b>Hierarchical</b>（manager agent 协调多个 worker）③ <b>Debate</b>（多个 agent 讨论达成共识）④ <b>Swarm</b>（agent 互相调用，去中心化）。<br><b>代价</b>：调用链长 → latency 高 + cost 高，<em>能 single-agent 不要 multi-agent</em>。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:74,cats:["Agent"],diff:"high",q:"简历写 '我设计了团队的 Skill 库'，可能被追问什么？",
ans:"5 追问：① 你的 skill 库多少 skills，覆盖什么场景？② 怎么决定哪些工作流值得封装成 skill？③ Skills 怎么 review+测试+监控？④ 团队 adoption 率多少 / 节省多少时间？⑤ 你写过哪个 skill 是 team 最高频使用的？",
bonus:"加分：能讲具体数字 + 失败 case + 怎么 sunset 没人用的 skill。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html#ch10'>X09 Q9</a>"},

/* ============= MCP / Agent / A2A 协议详解（源自《AI 大模型/Agent 面试题详解》）28 题 ============= */
{id:121,cats:["Agent"],diff:"basic",q:"什么是 MCP 协议？它在大模型系统中的作用？",
ans:"MCP（Model Context Protocol）是 Anthropic 2024 年底开源的开放标准，规范 LLM 应用与外部数据/工具/服务的连接，被称为 <em>AI 应用的 USB-C 接口</em>。<br><b>解决 3 痛点</b>：① <b>M×N→M+N</b>：M 个应用 × N 个工具，传统要 M×N 套对接，MCP 各实现一次即可 ② 打破上下文孤岛（无状态模型标准化获取实时数据/工具）③ 生态复用（一个 Server 任意客户端可用）。",
bonus:"借鉴 LSP（Language Server Protocol）思想——LSP 统一'编辑器↔语言服务'，MCP 统一'AI 应用↔上下文/工具'。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:122,cats:["Agent"],diff:"basic",q:"MCP 架构包含哪些核心组件？",
ans:"经典 Client-Server：<br>① <b>Host 宿主</b>：承载 AI 的应用（Claude Desktop/Cursor），管理多个 Client ② <b>Client</b>：由 Host 创建，与一个 Server <em>1:1 连接</em>，负责握手/协商/路由 ③ <b>Server</b>：暴露能力，提供三类原语 <code>Tools</code>(主动调用改世界)/<code>Resources</code>(只读上下文)/<code>Prompts</code>(模板) ④ <b>传输层</b>：JSON-RPC 2.0，stdio 或 HTTP+SSE/Streamable HTTP ⑤ 背后数据源/远程服务。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:123,cats:["Agent"],diff:"basic",q:"MCP 协议支持哪两种（传输）模式？",
ans:"指<b>两种传输模式</b>：<br>① <b>Stdio 本地</b>：Client 把 Server 当子进程，走 stdin/stdout，延迟低/无网络/安全，适合本地文件/DB ② <b>HTTP 远程</b>：早期 HTTP+SSE（POST 请求 + SSE 推送），新规范（2025-03）<em>Streamable HTTP</em> 统一单端点、可断线重连、适合 Serverless。",
trap:"注意区分——若问'Server 能力模式'答 Tools/Resources/Prompts；若问'传输模式'答 Stdio / HTTP。建议两者都提。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:124,cats:["Agent"],diff:"basic",q:"MCP 的工作流程是什么？",
ans:"分初始化 + 运行：<br><b>初始化</b>：① 建连接(stdio/HTTP) ② <code>initialize</code> 握手协商协议版本与 capabilities ③ 能力发现 <code>tools/list</code>/<code>resources/list</code>/<code>prompts/list</code>。<br><b>运行（一次工具调用）</b>：用户提问→Host 把工具列表+问题给 LLM→LLM 返回调用意图→Client 用 <code>tools/call</code> 发给 Server→Server 执行返回→结果回填 LLM→LLM 总结答复，<em>可多轮循环</em>。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:125,cats:["Agent"],diff:"basic",q:"MCP 协议安全性设计包含哪些层面？",
ans:"① <b>认证授权</b>：远程 Server 基于 <code>OAuth 2.1</code>，最小权限 scope ② <b>传输安全</b>：远程强制 HTTPS/TLS，防 DNS 重绑定校验 Origin ③ <b>用户同意(Human-in-the-loop)</b>：工具调用前需授权，敏感操作二次确认 ④ <b>权限隔离</b>：访问控制/沙箱/路径白名单/参数校验防注入 ⑤ <b>LLM 特有风险</b>：提示注入、工具投毒(描述污染)、令牌泄露、confused deputy。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:126,cats:["Agent"],diff:"basic",q:"如何将已有的应用转换成 MCP 服务？",
ans:"用官方 SDK 包一层适配器，把能力映射成 Tools/Resources/Prompts：<br>① 梳理能力（写操作→Tools，读→Resources，工作流→Prompts）② 选 SDK（Python FastMCP / TS / Java / C#）③ 注册工具写清描述+参数 schema ④ 工具函数里调原应用逻辑 ⑤ 选传输(stdio/Streamable HTTP) ⑥ 鉴权+参数校验 ⑦ 用 MCP Inspector 调试再接入客户端。",
bonus:"写好工具 description 和参数说明是最关键、最易忽视的一步——它是模型理解工具的唯一依据。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:127,cats:["Agent"],diff:"basic",q:"什么是 Manus？说说你对它的了解",
ans:"Monica（蝴蝶效应）2025 年初发布的<b>通用自主 AI Agent</b>，主打<em>知行合一</em>——不止给建议，能自主拆解任务、调浏览器/代码/文件，端到端交付。<br><b>特点</b>：① 异步云端执行(关页面后台跑完通知) ② 多工具协同(报告/筛简历/建站/数据分析) ③ 强工程化 Agent 编排（普遍认为基于 Claude 等现有强模型，重在规划/工具/上下文工程）。",
trap:"通用 Agent 共性挑战：长任务稳定性、错误累积、速度与成本、对底层模型强依赖。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:128,cats:["Agent"],diff:"mid",q:"Computer Use 是什么？说说它的原理",
ans:"让模型像人一样<em>直接操作 GUI</em>（看截图→鼠标键盘），不依赖每个应用的 API。Anthropic 2024-10 推出。<br><b>感知-决策-执行闭环</b>：① 感知：截图喂多模态模型理解界面 ② 决策：结合目标输出<em>具体坐标+操作</em>(点击 x,y / 输入 / 滚动) ③ 执行：工具层翻译成真实鼠标键盘事件 ④ 反馈：重新截图回到①循环。",
trap:"挑战——坐标定位精度、速度慢成本高(每步截图+推理)、易被提示注入诱导危险操作，需人类监督+沙箱。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:129,cats:["Agent"],diff:"basic",q:"ReAct 是什么？说说它的原理",
ans:"ReAct = Reasoning + Acting（2022 Google/普林斯顿），让模型<em>交替推理与行动</em>，是几乎所有 Agent 框架的基础。<br><b>核心循环 Thought→Action→Observation</b>：思考(规划下一步)→行动(调工具+参数)→观察(工具结果回填)→循环直到 Final Answer。<br><b>为何有效</b>：推理指导行动减少盲目；行动引入真实信息<em>显著降幻觉</em>；每步可见利于调试。",
bonus:"对比：纯 CoT 只推理易幻觉，纯 Act 缺规划；ReAct 是'会思考的工具使用者'。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:130,cats:["Agent"],diff:"mid",q:"大模型应用中通常如何实现长短期记忆机制？",
ans:"模型无状态，记忆靠外部工程：<br><b>短期</b>：上下文窗口内的对话历史，拼进 Prompt；受限于长度，优化用滑动窗口/摘要压缩/关键信息抽取。<br><b>长期</b>：跨会话持久化，主流 <em>向量库 + RAG</em>——内容 Embedding 入库(Milvus/Pinecone/pgvector)，新问题向量化做语义检索召回 Top-K 拼进 Prompt；也有结构化记忆/知识图谱/MemGPT/Mem0。",
bonus:"类比：短期像 RAM、长期像硬盘，检索就是把硬盘内容调回工作记忆。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:131,cats:["Agent"],diff:"basic",q:"什么是大模型 Agent？与传统 AI 系统有什么不同？",
ans:"以 LLM 为<b>大脑</b>，具备自主规划/记忆/用工具/与环境交互能力的系统，能接收高层目标自主拆解、决策、循环执行。<br><b>vs 传统 AI</b>：任务从专用单一→通用开放；流程从预先固化→动态推理生成；从被动响应→主动多步决策；从无/硬编码工具→动态调工具；从无状态→有长短期记忆。<em>传统 AI 是专才工具，Agent 是会用工具的通才执行者</em>。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:132,cats:["Agent"],diff:"basic",q:"LLM Agent 的基本架构有哪些组成部分？",
ans:"经典公式 <b>Agent = LLM + Planning + Memory + Tools</b>：<br>① <b>LLM 大脑</b>：理解/推理/决策中枢 ② <b>规划</b>：任务分解(CoT/ToT) + 反思改进(Reflection/Self-critique) ③ <b>记忆</b>：短期(上下文) + 长期(向量库检索) ④ <b>工具</b>：API/搜索/代码执行/DB，扩展能力并与环境交互。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:133,cats:["Agent"],diff:"basic",q:"LLM Agent 常见功能有哪些？",
ans:"① 任务规划与分解 ② 工具调用(搜索/计算/代码/业务 API) ③ 记忆管理 ④ 自主决策推理(ReAct) ⑤ 反思与自我纠错 ⑥ 检索增强 RAG 降幻觉 ⑦ 代码生成与执行 ⑧ 多 Agent 协作(规划者/执行者/审查者) ⑨ Human-in-the-loop ⑩ 多模态处理。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:134,cats:["Agent"],diff:"mid",q:"Agent 智能体的工作过程是怎样的？",
ans:"一个'<em>感知→规划→行动→观察→反思</em>'闭环（ReAct 的工程化）：① 接收目标理解意图 ② 规划分解子任务 ③ 选择行动(Thought+Action) ④ 执行工具与环境交互 ⑤ 观察结果更新记忆 ⑥ 反思评估(是否完成/出错/调整) ⑦ 未完成回③，完成则汇总输出。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:135,cats:["Agent"],diff:"high",q:"如何让 LLM Agent 具备长期记忆能力？",
ans:"核心 <em>外部存储 + 按需检索</em>：① <b>向量库+语义检索</b>(最主流，Top-K 召回注入) ② 结构化记忆(SQL/KV 存画像偏好) ③ 知识图谱(推理型) ④ <b>分层记忆 MemGPT</b>(借鉴 OS 分页，主上下文↔外部存储换入换出) ⑤ 记忆框架 Mem0(自动抽取/去重/更新/遗忘)。<br><b>工程点</b>：写什么(抽关键信息)、怎么检索(语义+关键词/时间/重要性混合)、更新与遗忘(衰减/摘要)、避免污染(校验+可清除)。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:136,cats:["Agent"],diff:"mid",q:"LLM Agent 如何进行动态 API 调用？",
ans:"① 工具/API 注册+描述(JSON Schema) ② 意图识别+工具选择 ③ 参数抽取(Function Calling 从自然语言填参，输出结构化 JSON) ④ 外层代码实际执行 HTTP(带鉴权) ⑤ 结果作 Observation 回填 ⑥ 多轮编排(链式)。<br><b>'动态'体现</b>：调哪个/什么顺序/参数取值都由模型<em>运行时推理决定</em>，可结合 OpenAPI 自动生成工具定义、甚至运行时发现(结合 MCP)。",
trap:"工程注意：参数校验、密钥管理、重试/超时/幂等/限流，以及防模型'编造不存在的 API/参数'。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:137,cats:["Agent"],diff:"high",q:"LLM Agent 在多模态任务中如何执行推理？",
ans:"把不同模态统一到可处理表示再联合推理，两条路线：<br><b>① 端到端 MLLM</b>：用原生多模态模型(GPT-4o/Claude/Gemini/Qwen-VL)，各模态经编码器映射到统一表示空间联合推理，跨模态对齐好。<br><b>② 工具化/模块化</b>：主控 LLM 规划，把非文本任务分派给专用工具(OCR/ASR/检测分割)，结果转文本回填，灵活可插拔。",
trap:"挑战：跨模态对齐与语义鸿沟、多模态幻觉、长视频/高分辨率成本、模态缺失鲁棒性。",
ref:"<a href='../ai-native/multimodal.html'>X10 多模态</a>"},

{id:138,cats:["Agent"],diff:"basic",q:"市面上有哪些主流 LLM Agent 框架？各自特点？",
ans:"<b>LangChain</b> 最流行组件化生态丰富但偏重；<b>LangGraph</b> 用图/状态机编排支持循环分支人机交互，适合复杂有状态流程；<b>LlamaIndex</b> 专注 RAG/检索；<b>AutoGPT</b> 早期自主 Agent 偏实验易死循环；<b>AutoGen</b> 多 Agent 对话协作；<b>CrewAI</b> 角色+协作；<b>MetaGPT</b> 模拟软件公司 SOP；<b>OpenAI Agents SDK/Swarm</b> 轻量 handoff；<b>Spring AI/Semantic Kernel</b> Java/.NET 企业级。",
bonus:"选型：通用快开 LangChain；复杂可控 LangGraph；知识库问答 LlamaIndex；多 Agent 协作 AutoGen/CrewAI；Java 企业级 Spring AI。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:139,cats:["Agent"],diff:"high",q:"AutoGPT 如何实现自主决策？",
ans:"LLM 驱动的'<em>目标→自我循环</em>'：① 用户给高层目标 ② LLM 拆解排序子任务 ③ <b>自主循环</b>：每轮基于'目标+历史+状态'决定下一步、输出结构化指令 ④ 执行工具/命令(搜索/读写文件/代码/API) ⑤ 向量库存历史供检索 ⑥ self-critique 反思评估 ⑦ 循环到达成或终止。",
trap:"局限：易陷死循环原地打转、错误累积、token/时间成本高、缺乏全局规划与终止判断——后来 LangGraph/AutoGen 用流程控制+人机协同弥补。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:140,cats:["Agent"],diff:"mid",q:"什么是 A2A 协议？核心架构及主要组件？",
ans:"Google 2025-04 开源(后捐 Linux 基金会)的<b>智能体间通信协议</b>：让不同厂商/框架的 Agent 互相发现、安全通信、协作。<em>MCP 解决 Agent↔工具，A2A 解决 Agent↔Agent</em>。基于 HTTP+JSON-RPC 2.0+SSE，区分 Client Agent(发起方)/Server Agent(执行方)。<br><b>组件</b>：<code>Agent Card</code>(放 /.well-known/agent.json 描述身份能力接口认证，能力发现基础)、<code>Task</code>(生命周期 submitted→working→input-required→completed/failed)、<code>Message</code>、<code>Part</code>(文本/文件/数据 多模态最小单元)、<code>Artifact</code>(产物)。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:141,cats:["Agent"],diff:"mid",q:"A2A 协议有哪五大设计原则？",
ans:"① <b>拥抱 Agent 能力</b>：让 Agent 以自然非结构化方式协作，当对方是真智能体而非工具 ② <b>基于现有标准</b>：HTTP/JSON-RPC 2.0/SSE，易集成 ③ <b>默认安全</b>：企业级认证授权(对齐 OpenAPI) ④ <b>支持长任务</b>：几秒到几小时甚至人工介入，提供实时状态/进度 ⑤ <b>模态无关</b>：原生支持音视频图像结构化数据。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:142,cats:["Agent"],diff:"basic",q:"A2A 协议的工作原理是怎样的？",
ans:"像调用'有自主能力的同事'委派任务，三块机制：<br>① <b>能力发现</b>：读对方 Agent Card 知道'是谁/能做什么/接口/怎么认证' ② <b>任务管理</b>：围绕 Task 生命周期，Client 创建发送、Server 执行更新状态、产出 Artifact，支持长任务与 input-required ③ <b>通信协作</b>：HTTP+JSON-RPC 收发 Message/Part，长任务用 SSE 流式或 Webhook 异步回调，认证对齐 OpenAPI。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:143,cats:["Agent"],diff:"basic",q:"A2A 协议的工作流程是怎样的？",
ans:"① <b>发现</b>：拉取 Server Agent Card ② <b>认证</b>：按声明方式授权 ③ <b>发起任务</b>：JSON-RPC(<code>message/send</code>/<code>tasks/send</code>)创建 Task ④ <b>执行与状态</b>：submitted→working，信息不足进 input-required 索要 ⑤ <b>实时反馈</b>：SSE 流式 / Webhook ⑥ <b>返回结果</b>：completed 返回 Artifact ⑦ 多轮协作链。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:144,cats:["Agent"],diff:"mid",q:"A2A 协议与 MCP 协议的关系是怎样的？",
ans:"<em>互补不竞争</em>：MCP 解决 <b>Agent↔工具/数据源</b>(垂直整合，给 Agent 装手脚工具箱)；A2A 解决 <b>Agent↔Agent</b>(水平协作，让 Agent 打电话开会)。MCP=Anthropic，A2A=Google。<br><b>协同</b>：A2A 把多 Agent 编排成协作网络，每个 Agent 内部用 MCP 连工具。例：主 Agent 经 A2A 把'订机票'委派给旅行 Agent，旅行 Agent 内部经 MCP 调航司查询+支付。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:145,cats:["Agent"],diff:"basic",q:"什么是 Google ADK？",
ans:"ADK = Agent Development Kit，Google 2025 年(与 A2A 同期)开源的<b>构建/编排/部署 Agent 框架</b>，是其内部 Agent 技术开源版。<br><b>特点</b>：① 代码优先(可控可测可版本化) ② 多 Agent 编排(Sequential/Parallel/Loop) ③ 丰富工具(集成 MCP 工具/LangChain) ④ 原生支持 A2A ⑤ 模型无关、部署灵活(本地/容器/Vertex AI) ⑥ CLI+可视化 Web UI。<em>对标 LangGraph/AutoGen</em>。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:146,cats:["Agent"],diff:"mid",q:"什么是工具调用 Tool Calling？如何用 Spring AI 实现？",
ans:"Tool Calling(=Function Calling)：模型判断需外部能力时<em>输出结构化调用请求(工具名+参数)</em>，应用执行后回填结果。<b>模型本身不执行工具，只决定调用并产出参数</b>。<br><b>Spring AI</b>：用 <code>@Tool</code> 注解：① 方法加 <code>@Tool</code>+<code>@ToolParam</code> 写清描述 ② 构建 <code>ChatClient</code> 时 <code>.tools(...)</code> 注册 ③ 框架自动把元数据发给模型、反射执行、回填，整个'请求-执行-回填'循环托管。也支持 FunctionCallback 与集成 MCP 客户端。",
ref:"<a href='../ai-native/agent_protocols_and_skills.html'>X09 MCP / Tools / Skills</a>"},

{id:147,cats:["Agent"],diff:"high",q:"什么是 OpenManus？它的实现原理是什么？",
ans:"MetaGPT 团队成员在 Manus 走红后几小时发起的<b>开源复刻</b>，无需邀请码本地运行通用自主 Agent。<br><b>原理</b>：① 核心 ReAct 循环(Think→Act→观察)，Agent 抽象 <code>BaseAgent→ReActAgent→ToolCallAgent</code> ② 工具系统(浏览器/Python 执行/文件/终端/搜索，Function Calling 选用) ③ 规划能力(拆步骤跟踪状态) ④ 多 Agent/Flow 编排(PlanningFlow) ⑤ 记忆与上下文管理 ⑥ 模型无关(GPT-4o/Claude/开源)。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

{id:148,cats:["Agent"],diff:"mid",q:"Agent 死循环问题遇到过吗？如何解决？",
ans:"<b>表现</b>：反复执行相似动作不推进(同工具同结果/两步横跳/反复重规划/卡错误重试)。<br><b>根因</b>：缺终止判断、无动作去重、工具报错无降级、目标模糊、上下文过长忘结论。<br><b>解</b>：① 硬性上限(最大步数/调用次数/超时) ② 循环检测(记录'动作+参数'，重复 N 次强制改策略/终止) ③ 明确终止条件 ④ 反思机制评估进展 ⑤ 状态机/图编排(LangGraph) ⑥ 错误重试有上限则换工具/上报 ⑦ Human-in-the-loop ⑧ 优化提示与规划 ⑨ 上下文摘要压缩。",
bonus:"回答技巧：先承认遇到过(实战)，再按'设上限→检测重复→明确终止→反思/状态机→人工兜底'由浅入深讲，层次清晰最加分。",
ref:"<a href='../ai-native/agent_architecture.html'>X03 Agent 架构</a>"},

/* ============= Eval 10 题 ============= */
{id:75,cats:["Eval"],diff:"high",q:"你怎么知道你的 AI 系统变好了？",
ans:"3 层：① <b>Offline</b>：自建 100-500 题 eval set + Rule-based + LLM-Judge 持续 CI ② <b>Pre-release</b>：human eval 关键 release 把关 ③ <b>Online</b>：A/B test + 业务 metric 跟踪。<em>缺一不可</em>。",
bonus:"能讲具体数字（'准确率 60% → 89%'）+ 提到 multi-objective（accuracy/latency/cost/safety/retention 都要看）。",
ref:"<a href='../ai-native/ai_eval.html#ch1'>X12 Ch1</a>"},

{id:76,cats:["Eval"],diff:"basic",q:"评测金字塔 4 层是？",
ans:"① <b>Rule-based</b>（最快 CI 用，毫秒）② <b>LLM-Judge</b>（快/主观题大规模，秒）③ <b>Human eval</b>（最贵最准/关键 release，分钟）④ <b>Online</b>（生产真实反馈，天-周）。速度/成本/真实性 trade-off。",
ref:"<a href='../ai-native/ai_eval.html#ch2'>X12 Ch2</a>"},

{id:77,cats:["Eval"],diff:"mid",q:"LLM-as-Judge 的 5 种偏差？怎么 mitigate？",
ans:"5 偏差：Position / Length / Self-Preference / Style / Verbosity-Cascade。<br><b>Mitigate</b>：① 随机两次顺序平均 ② prompt 明确'长度不影响打分'+ length penalty ③ 用别家模型当 judge ④ rubric 明确'看内容不看风格' ⑤ score 在 reasoning 前输出。",
ref:"<a href='../ai-native/ai_eval.html#s4-1'>X12 §4.1</a>"},

{id:78,cats:["Eval"],diff:"high",q:"为什么 MMLU 高分模型在你的业务上效果差？",
ans:"4 原因：① 业务任务跟 MMLU 题型不匹配 ② Benchmark 已污染（训练数据里有题）③ 业务有 specific data distribution（方言/行话/领域知识）④ 业务 metric 不只准确率（latency/cost/safety）。<em>所以必须自建 eval set</em>。",
ref:"<a href='../ai-native/ai_eval.html#ch6'>X12 Ch6</a>"},

{id:79,cats:["Eval"],diff:"mid",q:"Goodhart's Law 在 AI eval 怎么体现？怎么避免？",
ans:"<b>体现</b>：'准确率'唯一 KPI → LLM 学会'答得长/含糊'骗高分。'用户满意度' KPI → AI 过度恭维。<br><b>避免</b>：① multi-objective metric（不靠一个）② 持续校准 metric 跟业务价值的关联 ③ 定期 audit eval set 看 metric 是否被 hack。",
ref:"<a href='../ai-native/ai_eval.html#ch7'>X12 Ch7</a>"},

{id:80,cats:["Eval"],diff:"mid",q:"Pairwise vs Direct Scoring 哪个更好？",
ans:"<b>Pairwise (推荐)</b>：'哪个更好'比'打 1-5 分'更稳。人类擅长比较不擅长绝对评分，LLM 也是。Chatbot Arena 用这个。<br><b>Direct 局限</b>：同题不同次打分波动 ±1 常见；没 reference 时绝对分数意义弱。",
ref:"<a href='../ai-native/ai_eval.html#ch4'>X12 Ch4</a>"},

{id:81,cats:["Eval"],diff:"high",q:"A/B test 新模型 accuracy +5% 但用户流失 +12%，怎么排查？",
ans:"5 步：① 检查实际答案（长度/风格/结构变了？）② 检查 latency ③ 检查具体 case（抽 100 流失会话看变什么）④ 检查 metric 定义（accuracy 跟用户真正关心的一致吗？）⑤ 分群分析（哪类用户流失最多）。",
ref:"<a href='../ai-native/ai_eval.html#ch9'>X12 Ch9</a>"},

{id:82,cats:["Eval"],diff:"mid",q:"Eval set 怎么避免过拟合？",
ans:"4 步：① 留 holdout（80% 迭代 / 20% final eval 不要看）② 定期扩充（每月生产新增 50-100 题）③ 多样性（简单/复杂/长尾/边界）④ 定期换（6 个月做一次大改）。",
ref:"<a href='../ai-native/ai_eval.html#ch10'>X12 Q9</a>"},

{id:83,cats:["Eval"],diff:"high",q:"从 0 给一个 RAG 产品建 eval 体系，1 周时间怎么做？",
ans:"5 天：<br>D1: 从生产日志抽 100 题分类标签<br>D2: 人工标注标准答案+评分要点<br>D3: 用 RAGAS 实现 4 metric + 写 runner<br>D4: 跑 baseline + CI 集成<br>D5: 建 dashboard + 告警",
bonus:"提到'先 100 题 baseline 看 1 月数据再 scale up'，不上来追 1000 题。",
ref:"<a href='../ai-native/ai_eval.html#ch10'>X12 Q10</a>"},

{id:84,cats:["Eval"],diff:"basic",q:"RAGAS 4 metric 是哪些？分别看什么？",
ans:"① <b>Context Precision</b>: 召回的 chunk 有多准（top-10 里几个真相关）② <b>Context Recall</b>: 真正相关的召回了多少 ③ <b>Faithfulness</b>: 答案是否基于 context（反幻觉）④ <b>Answer Relevance</b>: 答案是否切题。",
ref:"<a href='../ai-native/ai_eval.html#ch10'>X12 Q6</a>"},

/* ============= AI Infra 14 题 ============= */
{id:85,cats:["AI Infra"],diff:"basic",q:"CPU 和 GPU 的核心区别？为什么 LLM 用 GPU？",
ans:"<b>CPU</b>：少而强（~64 core, 复杂分支预测/大 cache）。<br><b>GPU</b>：多而简单（~17k SP, SIMT 执行）。<br>LLM 训练/推理大量同质操作（矩阵乘/attention），GPU 在这类任务上<em>算力 ~100x、带宽 ~30x</em>。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#ch1'>Y01 Ch1</a>"},

{id:86,cats:["AI Infra"],diff:"mid",q:"SIMT 和 SIMD 区别？",
ans:"<b>SIMD</b>：CPU 的 SSE/AVX，1 条指令操作 1 个 vector（4-16 个数据），编程粒度小。<br><b>SIMT</b>：GPU 的 warp，1 条指令 32 个 thread 同时执行。<em>编程模型更线程感</em> — 你写 thread 代码硬件自动 32 个并行。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#s2-2'>Y01 §2.2</a>"},

{id:87,cats:["AI Infra"],diff:"mid",q:"Warp Divergence 是什么？怎么避免？",
ans:"<b>是什么</b>：同 warp 32 thread 走不同分支（if-else），硬件串行执行两个分支，throughput 减半。<br><b>避免</b>：① 按 warp 边界分配工作（threadIdx.x/32 决定分支，而非 %2）② 用预计算 mask 替代条件赋值 ③ 把分支移到 host 决定（不同 kernel）。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#s2-3'>Y01 §2.3</a>"},

{id:88,cats:["AI Infra"],diff:"mid",q:"Coalesced Memory Access 是什么？为什么重要？",
ans:"同 warp 32 thread 访问连续内存（如 thread i 访问 data[i]），硬件合并成 <em>1 次 HBM 事务</em>。反之分散访问要 32 次事务，<em>性能差 32x</em>。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#ch3'>Y01 Ch3</a>"},

{id:89,cats:["AI Infra"],diff:"high",q:"怎么把 naive GEMM 优化到 cuBLAS 60%？",
ans:"5 步：① <b>Tiling</b>：把 A/B 小块搬 Shared Memory ② <b>Register Tiling</b>：每 thread 算 C 的 4×4 而非 1×1 ③ <b>Double Buffering</b>：预取下一 tile hide HBM 延迟 ④ <b>避免 bank conflict</b>：padding shared 数组宽度 ⑤ <b>用 Tensor Core (WMMA)</b>：再 +25%。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#ch6'>Y01 Ch6</a>"},

{id:90,cats:["AI Infra"],diff:"basic",q:"Tensor Core 是什么？怎么用？",
ans:"GPU 内专门做'矩阵×矩阵'的硬件单元。1 cycle 完成 4×4 × 4×4（普通 SP ~64 cycle）。Volta 引入，2026 已演化到 Blackwell FP4。<br><b>怎么用</b>：① 用 cuBLAS/cuDNN/cutlass/FlashAttention 自动用 ② 矩阵尺寸对齐 8/16/32 ③ 用 FP16/BF16/FP8 而非 FP32 ④ Nsight 看 utilization 验证。",
ref:"<a href='../ai-infra/cuda_for_cpp.html#ch5'>Y01 Ch5</a>"},

{id:91,cats:["AI Infra"],diff:"mid",q:"训 70B 模型需要的显存？为什么是 weight 的 7-10x？",
ans:"账本：weight (1x) + grad (1x) + Adam state (4x，FP32 m+v) + activation (1-4x) = 7-10x weight。<em>70B FP16 = 1-1.4 TB</em>，至少 15-20 张 H100。",
ref:"<a href='../ai-infra/distributed_training.html#ch1'>Y03 Ch1</a>"},

{id:92,cats:["AI Infra"],diff:"basic",q:"DP / TP / PP 区别？什么时候用哪个？",
ans:"<b>DP</b>：不同 GPU 跑不同数据，每张完整模型，模型装下单卡才用。<br><b>TP</b>：同一层矩阵切到多卡，通信极频繁，<em>需要 NVLink 限节点内</em>。<br><b>PP</b>：不同层放不同卡，通信少（只在边界），适合跨节点，但有 bubble。",
ref:"<a href='../ai-infra/distributed_training.html#ch2'>Y03 Ch2</a>"},

{id:93,cats:["AI Infra"],diff:"high",q:"ZeRO 3 个 stage 区别？",
ans:"① <b>ZeRO-1</b>：optimizer state 分 ② <b>ZeRO-2</b>：optimizer + gradient 分 ③ <b>ZeRO-3 (FSDP)</b>：weight + grad + opt 全分。<br><b>权衡</b>：越高 stage 显存越省但通信开销越大。ZeRO-3 每层 forward 都要 AllGather weight。",
ref:"<a href='../ai-infra/distributed_training.html#ch4'>Y03 Ch4</a>"},

{id:94,cats:["AI Infra"],diff:"mid",q:"FSDP vs DeepSpeed ZeRO-3 区别？",
ans:"<b>两者等价</b>：FSDP 是 PyTorch 原生 ZeRO-3。功能一致。<br><b>选型</b>：2024+ 推荐 FSDP（PyTorch 团队主推，更好集成 torch.compile/mixed precision）。DeepSpeed 仍在 Microsoft/历史代码库常见。",
ref:"<a href='../ai-infra/distributed_training.html#s4-2'>Y03 §4.2</a>"},

{id:95,cats:["AI Infra"],diff:"mid",q:"Pipeline Parallel 的 bubble 是什么？怎么减少？",
ans:"<b>是什么</b>：PP 流水线启动和收尾时部分卡 idle 的现象。bubble ratio ≈ (PP-1)/(PP-1+num_microbatch)。<br><b>减少</b>：① 增加 micro-batch 数（典型 ≥ 4×PP）② 用 1F1B 或 Interleaved 1F1B 调度 ③ 缩小 PP 维度。",
ref:"<a href='../ai-infra/distributed_training.html#ch6'>Y03 Ch6</a>"},

{id:96,cats:["AI Infra"],diff:"basic",q:"NCCL 5 个核心原语？",
ans:"AllReduce（DP 梯度同步）/ ReduceScatter（ZeRO-2）/ AllGather（FSDP forward）/ All-to-All（MoE expert dispatch）/ Broadcast（init 同步 weight）。",
ref:"<a href='../ai-infra/distributed_training.html#ch9'>Y03 Ch9</a>"},

{id:97,cats:["AI Infra"],diff:"high",q:"为什么 Ring AllReduce 比 naive AllReduce 好？",
ans:"<b>Naive</b>：所有卡 → master 汇总 → master 广播。<em>master 是瓶颈，O(N×T) 通信</em>。<br><b>Ring</b>：组 ring，每张卡都参与传输。<em>通信量恒定 2T 不随 N 增长，带宽最优</em>。",
ref:"<a href='../ai-infra/distributed_training.html#ch9'>Y03 §9.2</a>"},

{id:98,cats:["AI Infra"],diff:"high",q:"千卡训练 NCCL hang 怎么排查？",
ans:"5 步：① 看 NCCL log（设 NCCL_DEBUG=INFO）② 找慢卡（dcgmi/nvidia-smi 看 util 异常）③ 检查 ECC 错误（硬件慢慢退化常见）④ 网络（ibstatus/ib_send_bw 测 IB 健康）⑤ 设 NCCL_TIMEOUT（默认无穷大）避免下次再 hang。",
ref:"<a href='../ai-infra/distributed_training.html#ch10'>Y03 Ch10</a>"},

/* ============= 系统设计 10 题（小题，大题在 I07）============= */
{id:99,cats:["系统设计"],diff:"mid",q:"设计一个 LLM serving 系统支持 1000 QPS，单 H100 80GB，模型 Qwen-7B，怎么搭？",
ans:"① <b>模型</b>：Qwen-7B FP16 = 14GB，剩余 66GB 大量 KV ② <b>推理引擎</b>：vLLM（PagedAttention + Continuous Batching）③ <b>量化</b>：FP8 KV-Cache 再省一半 ④ <b>调参</b>：max_num_seqs=64-128，开启 prefix caching ⑤ <b>水平扩展</b>：1 张 H100 ~500 QPS（依赖 prompt 长度），<em>2 张 H100 + LB 跑 1000 QPS</em>。",
ref:"<a href='../ai-infra/inference_serving.html'>Y02</a>"},

{id:100,cats:["系统设计"],diff:"high",q:"设计一个支持百万用户的 RAG 客服系统，怎么解决冷启动？",
ans:"<b>冷启动 3 难</b>：① 没真实问题→eval set 难建 ② 知识库未优化→准确率低 ③ 用户期望未校准。<br><b>解</b>：① 先用 GPT-4 + 100 题 mock eval 跑 baseline ② 用业务专家访谈生成 SOP 文档 ③ 灰度 1%（仅简单问题）+ 24h fallback 转人工 ④ 一周收集真实失败 case，每周 retrain RAG ⑤ 4 周后准确率达 80% 再扩流量。",
ref:"<a href='./ai_system_design.html'>I07 系统设计</a>"},

{id:101,cats:["系统设计"],diff:"mid",q:"RAG vs Fine-tune vs Long Context 怎么选？",
ans:"<b>RAG</b>：知识量大/会更新/需要引用出处 → 默认。<br><b>Fine-tune</b>：风格定制/特定输出格式/复杂任务理解 → SFT/LoRA。<br><b>Long Context</b>：单文档分析/Agent long horizon → 用上下文窗口。<br><b>实战</b>：生产经常 RAG + 轻 fine-tune（学风格）+ 中等上下文（4-32k）结合。",
ref:"<a href='../ai-native/rag_deep_dive.html'>X08</a>"},

{id:102,cats:["系统设计"],diff:"high",q:"设计一个 AI Coding Agent，跟 Cursor / Devin 类似，关键组件？",
ans:"① <b>Codebase indexing</b>：embedding 整 repo（如 ast-grep + bge）② <b>Agent loop</b>：plan → action → observation 循环 ③ <b>Tools</b>：read/write/run_test/git_diff/web_search ④ <b>Sandboxing</b>：所有代码改动跑在 container ⑤ <b>Eval/rollback</b>：每个 commit 跑测试，失败自动 rollback ⑥ <b>UI</b>：streaming + 可中断 + diff 预览。<br><b>关键 trade-off</b>：autonomy vs 人工 review 频率。",
ref:"<a href='../ai-native/ai_coding_agent.html'>X13</a>"},

{id:103,cats:["系统设计"],diff:"mid",q:"设计一个 LLM-based 推荐系统，cold start 怎么做？",
ans:"① <b>Embedding 用户兴趣</b>：用户基础属性 + few-shot 历史 → LLM 生成兴趣向量 ② <b>检索候选</b>：vector search 召回 top-100 候选 item ③ <b>LLM 精排</b>：context 含用户画像 + 候选 → LLM 选 top-5 ④ <b>fallback</b>：cold start 用 popular item ⑤ <b>实时 feedback</b>：用户点击/停留更新画像。<br><b>cost 控制</b>：精排用小模型 + cache 高频用户画像。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

{id:104,cats:["系统设计"],diff:"high",q:"设计智驾感知系统的端到端 VLM 推理，关键约束？",
ans:"<b>硬约束</b>：① latency &lt; 100ms (P99) ② 车规级算力 (Orin/Thor 200-1000 TOPS) ③ 功耗 &lt; 100W ④ 可解释 (失败可 debug)。<br><b>关键设计</b>：① 量化激进 (INT8 主流 / INT4 实验) ② 模型小（3B-8B 主流）③ 视觉 encoder + LLM decoder 分离 ④ 多任务 head（检测+分类+规划共享 backbone）⑤ rule-based fallback 兜底。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

{id:105,cats:["系统设计"],diff:"mid",q:"设计一个 A/B 测试平台用于 AI 产品（跟传统 A/B 区别）？",
ans:"<b>AI 特殊性</b>：① 样本需求大（accuracy diff 小，要更长时间）② multi-arm bandit 更优（持续学习用户偏好）③ quality 跟 latency/cost trade-off 难单维评估 ④ long-tail effect（10% 长尾用户影响很大）⑤ 反馈延迟（用户当下不投诉≠满意）。<br><b>设计</b>：① 多维度 metric（quality+cost+latency+retention）② 自动化 statistical significance ③ guardrail（quality 跌 &gt; X% 自动停）④ 长尾监控。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

{id:106,cats:["系统设计"],diff:"high",q:"设计 Multi-LoRA serving 平台（1 个 base 模型服务 N 个用户 fine-tune）？",
ans:"① <b>Base 模型</b>：1 张 GPU 加载 1 次 ② <b>LoRA 存储</b>：所有 LoRA 在 CPU memory（每个 ~10-50 MB）③ <b>请求路由</b>：根据 user_id 找对应 LoRA ④ <b>动态加载</b>：把 LoRA swap 到 GPU 临时合并 ⑤ <b>缓存策略</b>：LRU 把热门 LoRA 留 GPU ⑥ <b>批处理</b>：同 LoRA 的请求 batch 在一起减少切换。<br><b>实现</b>：vLLM / SGLang 已支持。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

{id:107,cats:["系统设计"],diff:"mid",q:"设计 AI 反作弊系统检测 LLM 生成的内容（如 essay / 代码）",
ans:"① <b>统计特征</b>：burstiness / perplexity / token distribution 异常 ② <b>水印检测</b>：如果模型加了 logit watermark ③ <b>风格指纹</b>：用户历史 vs 当前样本对比 ④ <b>多模型 ensemble</b>：用多个 detector 投票 ⑤ <b>主动诱导</b>：编辑后再 detect。<br><b>难点</b>：人类辅助 LLM 修改后基本不可检测，<em>近 100% 准确不现实，能识别 70% 已经很好</em>。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

{id:108,cats:["系统设计"],diff:"high",q:"设计 LLM 推理服务的限流和成本控制系统？",
ans:"5 层：① <b>Rate limit</b>（每用户 QPS / 每分钟 token）② <b>Quota</b>（每用户每月 token 上限 + 报警）③ <b>Priority</b>（VIP 用户优先调度）④ <b>Model routing</b>（简单问题用小模型，复杂上大模型）⑤ <b>Cache</b>（identical query 24h cache）。<br><b>监控</b>：实时 cost dashboard + 用户级 breakdown + 异常 alert。",
ref:"<a href='./ai_system_design.html'>I07</a>"},

/* ============= 行为 12 题 ============= */
{id:109,cats:["行为"],diff:"basic",q:"为什么从传统后端转 AI 工程？",
ans:"<b>差答案</b>：'AI 是大趋势 / 我觉得有意思'。<br><b>好答案</b>：① 具体触发（如做过 X 项目发现 LLM 能极大提升 X）② 已经做的准备（学了 X、跑了 Y demo）③ 长期规划（3 年内想成为 X 方向 senior）④ 跟当前能力的关系（C++ → AI Infra 是杠杆方向）。",
bonus:"展示一个自己做的 side project + 数字（如'我做的 RAG 在 X 场景准确率 X%'）。"},

{id:110,cats:["行为"],diff:"mid",q:"讲一次你 AI 项目的失败 case",
ans:"必含 STAR + L：<br><b>S</b>: 项目背景（具体业务+规模）<br><b>T</b>: 你的角色+目标<br><b>A</b>: 失败的具体决策（不要遮掩，要诚实）<br><b>R</b>: 量化损失（用户 / 钱 / 时间）<br><b>L (lesson)</b>: 学到什么 + 之后怎么避免<br><b>关键</b>：选'你能解释清楚根因 + 真的 own 责任'的 case，不要选'是别人/老板/客户的锅'。"},

{id:111,cats:["行为"],diff:"mid",q:"如何在 AI 项目中跟产品 / 法务 / SRE 跨部门协作？",
ans:"<b>跟产品</b>：用 eval 数据说话（'accuracy +5% 但 latency +2x，怎么 trade-off'）<br><b>跟法务</b>：提前 1 个月 review LLM 输出（PII / 版权 / 监管）+ 准备 audit log<br><b>跟 SRE</b>：制定 SLO（quality + latency + cost 三角）+ 异常 runbook + on-call rotation<br><b>关键</b>：把 AI 的'不确定性'翻译成对方语言（产品看 metric / 法务看 risk / SRE 看 SLA）。"},

{id:112,cats:["行为"],diff:"high",q:"给 VP 解释 '为什么我们的 RAG 准确率只有 85% 不能上线' 怎么说？",
ans:"<b>错误说法</b>：'85% 不够好我们要继续调'。VP 听不懂。<br><b>正确说法</b>：① <b>具体翻译</b>：'85% = 每 100 个用户中 15 个会被误导' ② <b>对标</b>：'人工客服 92%，行业最佳 88%' ③ <b>风险量化</b>：'如果上线 100k DAU，每天 15k 用户被误导，预计客诉 X 单 / 退订 Y 单' ④ <b>有 plan B</b>：'我建议 1% 灰度 + 兜底转人工 4 周收集数据后再决定全量' ⑤ <b>给选项</b>：'option A 推迟 1 月调到 90% / option B 现在小流量灰度，您选'。"},

{id:113,cats:["行为"],diff:"mid",q:"你团队 AI 项目落后 2 周，怎么处理？",
ans:"① <b>诊断根因</b>：是 scope creep / 技术 blocker / 资源不足？② <b>3 选项给 leadership</b>：A 砍 scope（保 deadline）/ B 加资源（保 scope）/ C 推迟 deadline（保质量）③ <b>不要藏</b>：早暴露比晚暴露好，<em>晚暴露是 senior 跟 mid 最大区别</em> ④ <b>持续 status update</b>：每周给 stakeholder 同步 → 不让人惊讶。"},

{id:114,cats:["行为"],diff:"mid",q:"你们 RAG 准确率上线 3 个月从 90% 掉到 70%，你 on-call 收到告警怎么处理？",
ans:"30 分钟内：① 看 dashboard 确认告警真假 ② 抽 50 个失败 case 手动看 ③ 跟 production 配置对比 baseline。<br>1 小时内：④ 找 root cause 分类（输入分布变了？知识库变了？LLM API 升级？）⑤ 决定 mitigation（rollback prompt / 切回旧 model / 增加 fallback）。<br>24 小时内：⑥ 写 postmortem + 修复 + regression test。<br><em>不要立刻'修一下试试'</em>，没诊断清楚的修复会引入更多问题。"},

{id:115,cats:["行为"],diff:"high",q:"作为 senior，你怎么帮 junior 在 AI 团队 ramp up？",
ans:"<b>30/60/90 计划</b>：<br>D1-30: 跟着我跑 1 个 RAG demo + 学 eval 体系 + 读 X06/Y02<br>D30-60: 独立做 1 个小 feature（如 prompt 优化）+ 我每周 review<br>D60-90: 主导 1 个小项目 + 自己跟 PM/数据沟通 + 我只给方向<br><br><b>关键</b>：① 让他做'有产出'的事而不是'看代码'② 每周 1on1 反馈不憋 ③ 教学习方法（eval-driven 而非 vibe-driven）④ 给犯错空间（小项目能 rollback 的）。"},

{id:116,cats:["行为"],diff:"basic",q:"为什么你跳槽？",
ans:"<b>3 不要</b>：① 抱怨前公司 / 老板 ② 'pay 更高' ③ '当前没成长'。<br><b>3 要</b>：① 具体的 push（如'我们方向收缩，我擅长的 AI Infra 没机会'）② 具体的 pull（如'你们的 X 项目正好是我下个 3 年想深耕的方向'）③ 跟自己长期 plan 关联（'我的目标是 AI Infra Staff'）。<br><em>跳槽不是逃离，是 promotion</em>。"},

{id:117,cats:["行为"],diff:"mid",q:"你跟 leader 技术决策冲突怎么处理？（如他要选 Claude，你认为 Qwen 更好）",
ans:"① <b>用数据说话</b>：在 eval set 上跑两个模型，准确率/cost/latency 对比 ② <b>列 trade-off matrix</b>：每方案 5-6 维度评分 ③ <b>假设 leader 看到了你没看到的</b>：跟他讨论他的考虑（合规？战略？已有合同？）④ <b>最终 disagree but commit</b>：决策做完全力支持，不背后抱怨 ⑤ <b>3-6 个月后用数据复盘</b>：客观评估决策结果。"},

{id:118,cats:["行为"],diff:"mid",q:"你怎么 onboarding 一个新员工到 AI 团队？给团队的 AI 经验沉淀建议？",
ans:"<b>Onboarding</b>：① 给一份团队 README（架构图 + 关键决策 ADR + 常用工具）② 第一周做'团队产品深度用'+ '看 1 个 incident postmortem' ③ 第一个 ticket 选 small + visible（如改 prompt 调 eval）④ buddy 制度。<br><b>沉淀</b>：① ADR 每个技术决策写 ② Postmortem 每个 incident 写 ③ Skill 库共享 ④ 月度 brown bag 分享 ⑤ 公开 eval set 让所有人贡献。"},

{id:119,cats:["行为"],diff:"high",q:"你怎么向 CEO 报告 'AI 项目 ROI 怎么样'？",
ans:"<b>CEO 关心 3 件事</b>：钱 / 时间 / 风险。<br><b>结构</b>：<br>① <b>投入</b>：人力 X 月 / GPU $Y / 第三方 API $Z<br>② <b>产出</b>：DAU + N / 客单价 + X% / NPS + Y 分 / 客服成本 -Z%（具体数字）<br>③ <b>ROI 计算</b>：(产出 - 投入) / 投入<br>④ <b>风险</b>：accuracy 退化 / cost 上涨 / 合规 ⇒ mitigation<br>⑤ <b>下季度 ask</b>：要多少钱 / 解决什么问题<br><br><em>不要讲技术细节</em>。CEO 不懂 RAG，他懂 ROI。"},

{id:120,cats:["行为"],diff:"mid",q:"AI 团队 KPI 怎么定？只看准确率会有什么问题？",
ans:"<b>只看准确率的问题</b>：① Goodhart's Law（团队会优化 metric 而非业务）② 忽略 cost（cost 翻倍 +5% accuracy 可能不划算）③ 忽略 latency（accuracy 高但慢用户流失）④ 忽略 safety（accuracy 高但有越狱风险）。<br><b>推荐 KPI</b>：multi-objective（accuracy + cost + P95 latency + safety + NPS），<em>团队和业务一起定 trade-off 优先级</em>。"},

];

/* ============= 渲染 ============= */
const MASTERED_KEY = 'ai_cards_mastered';
let mastered = new Set(JSON.parse(localStorage.getItem(MASTERED_KEY) || '[]'));
let filterCat = 'all', filterDiff = 'all', filterMastery = 'all', searchTerm = '';

function render(){
  const container = document.getElementById('cards');
  const filtered = CARDS.filter(c => {
    if(filterCat !== 'all' && !c.cats.includes(filterCat)) return false;
    if(filterDiff !== 'all' && c.diff !== filterDiff) return false;
    const isM = mastered.has(c.id);
    if(filterMastery === 'mastered' && !isM) return false;
    if(filterMastery === 'unmastered' && isM) return false;
    if(searchTerm){
      const t = (c.q + ' ' + c.ans + ' ' + (c.bonus||'') + ' ' + (c.trap||'') + ' ' + c.cats.join(',')).toLowerCase();
      if(!t.includes(searchTerm.toLowerCase())) return false;
    }
    return true;
  });

  container.innerHTML = filtered.length === 0
    ? '<div class="no-results">😅 没有匹配的卡片，试试改下筛选条件</div>'
    : filtered.map(c => renderCard(c)).join('');

  document.getElementById('stats').innerHTML =
    `已显示 <strong>${filtered.length}</strong> / 共 148 题 · 已掌握 <strong id="mastered-count">${mastered.size}</strong> 题`;

  attachCardEvents();
}

function renderCard(c){
  const m = mastered.has(c.id);
  return `<div class="card diff-${c.diff} ${m?'mastered':''}" data-id="${c.id}">
    <div class="card-header">
      <span class="card-id">#${String(c.id).padStart(3,'0')}</span>
      <span class="card-cats">${c.cats.map(x=>`<span class="card-cat">${x}</span>`).join('')}</span>
      <span class="card-diff ${c.diff}">${c.diff==='basic'?'基础':c.diff==='mid'?'进阶':'高频'}</span>
      <div class="card-actions">
        <button class="btn-master ${m?'active':''}" data-id="${c.id}">${m?'✓ 已掌握':'标记掌握'}</button>
      </div>
    </div>
    <div class="card-q">${c.q}</div>
    <div class="card-body">
      <div class="card-ans">${c.ans}</div>
      ${c.bonus?`<div class="extra bonus">${c.bonus}</div>`:''}
      ${c.trap?`<div class="extra trap">${c.trap}</div>`:''}
      ${c.ref?`<div class="extra ref">${c.ref}</div>`:''}
    </div>
  </div>`;
}

function attachCardEvents(){
  document.querySelectorAll('.card .card-q').forEach(el => {
    el.onclick = (e) => {
      e.target.closest('.card').classList.toggle('open');
    };
  });
  document.querySelectorAll('.btn-master').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if(mastered.has(id)) mastered.delete(id);
      else mastered.add(id);
      localStorage.setItem(MASTERED_KEY, JSON.stringify([...mastered]));
      render();
    };
  });
}

/* Filter events */
document.querySelectorAll('.filter-cat').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.filter-cat').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filterCat = c.dataset.cat;
    render();
  };
});
document.querySelectorAll('.filter-diff').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.filter-diff').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filterDiff = c.dataset.diff;
    render();
  };
});
document.querySelectorAll('.filter-mastery').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.filter-mastery').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    filterMastery = c.dataset.mastery;
    render();
  };
});
document.getElementById('search').oninput = (e) => { searchTerm = e.target.value; render(); };
document.getElementById('expand-all').onclick = () => {
  document.querySelectorAll('.card').forEach(c => c.classList.add('open'));
};
document.getElementById('collapse-all').onclick = () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
};
document.getElementById('random').onclick = () => {
  const cards = document.querySelectorAll('.card:not(.hidden)');
  if(cards.length === 0) return;
  const r = cards[Math.floor(Math.random() * cards.length)];
  r.scrollIntoView({behavior:'smooth', block:'center'});
  r.classList.add('open');
  r.style.boxShadow = '0 0 24px var(--accent)';
  setTimeout(() => r.style.boxShadow = '', 1500);
};
document.getElementById('reset-mastery').onclick = () => {
  if(confirm('重置所有掌握标记？')){
    mastered.clear();
    localStorage.removeItem(MASTERED_KEY);
    render();
  }
};

/* URL 参数支持 */
const params = new URLSearchParams(window.location.search);
if(params.get('cat')){
  const c = document.querySelector(`.filter-cat[data-cat="${params.get('cat')}"]`);
  if(c) c.click();
}
if(params.get('diff')){
  const d = document.querySelector(`.filter-diff[data-diff="${params.get('diff')}"]`);
  if(d) d.click();
}
