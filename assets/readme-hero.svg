    <rect x="346" y="388" width="214" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="374" y="417">AI Engineering</text>

    <rect x="580" y="388" width="176" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="608" y="417">Big Data</text>

    <rect x="776" y="388" width="196" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="804" y="417">Architecture</text>

