      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>

  <circle cx="1450" cy="120" r="160" fill="#dbeafe" opacity="0.55"/>
  <circle cx="220" cy="560" r="220" fill="#e0e7ff" opacity="0.42"/>

