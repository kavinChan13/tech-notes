  <text x="120" y="286" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" fill="#6b7280">Build deep knowledge, one topic at a time.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="336" width="1240" height="220" rx="20" fill="#ffffff" stroke="#e5e7eb"/>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="20" fill="#374151">
    <rect x="160" y="388" width="166" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
